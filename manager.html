<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SU Bar Rota — Rota Builder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0d0d0d; --surface: #161616; --surface2: #1e1e1e;
      --border:  #2a2a2a; --accent: #c8f557; --text: #f0ede6;
      --muted:   #6b6b6b; --error: #ff6b6b; --green: #4ade80;
      --amber:   #fbbf24; --purple: #a78bfa; --orange: #fb923c;
      --radius:  10px; --nav-w: 240px;
    }
    html, body { height:100%; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-weight:300; }
    body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); opacity:.03; pointer-events:none; z-index:0; }
    .app { position:relative; z-index:1; display:flex; min-height:100vh; }

    /* Nav */
    .nav { width:var(--nav-w); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; padding:1.75rem 1rem; z-index:10; }
    .nav-logo { font-family:'DM Serif Display',serif; font-size:1rem; padding:0 0.5rem; margin-bottom:2rem; }
    .nav-logo span { color:var(--accent); }
    .nav-section { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); padding:0 0.5rem; margin:1rem 0 0.4rem; }
    .nav-link { display:flex; align-items:center; gap:0.65rem; padding:0.6rem 0.75rem; border-radius:8px; color:var(--muted); text-decoration:none; font-size:0.88rem; transition:background .15s,color .15s; cursor:pointer; border:none; background:none; width:100%; text-align:left; }
    .nav-link:hover { background:var(--surface2); color:var(--text); }
    .nav-link.active { background:rgba(200,245,87,0.1); color:var(--accent); }
    .nav-link .icon { font-size:1rem; width:1.2rem; text-align:center; }
    .nav-bottom { margin-top:auto; }
    .nav-user { display:flex; align-items:center; gap:0.65rem; padding:0.75rem; border-radius:8px; border:1px solid var(--border); margin-bottom:0.5rem; }
    .nav-avatar { width:32px; height:32px; border-radius:50%; background:var(--accent); color:#0d0d0d; display:flex; align-items:center; justify-content:center; font-size:0.8rem; font-weight:500; flex-shrink:0; }
    .nav-user-name { font-size:0.85rem; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .nav-user-role { font-size:0.72rem; color:var(--muted); text-transform:capitalize; }

    /* Layout */
    .main { margin-left:var(--nav-w); flex:1; padding:2.5rem 2.5rem 8rem; }
    .page-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:2rem; animation:fadeUp .4s ease both; flex-wrap:wrap; gap:1rem; }
    .page-title { font-family:'DM Serif Display',serif; font-size:2rem; font-weight:400; }
    .page-subtitle { color:var(--muted); font-size:0.9rem; margin-top:0.25rem; }
    .header-actions { display:flex; gap:0.75rem; }

    /* Buttons */
    .btn { padding:0.6rem 1.25rem; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:0.88rem; font-weight:500; cursor:pointer; border:none; transition:all .15s; }
    .btn-primary { background:var(--accent); color:#0d0d0d; }
    .btn-primary:hover { background:#d4f96e; }
    .btn-primary:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; }
    .btn-outline { background:transparent; color:var(--text); border:1px solid var(--border); }
    .btn-outline:hover { border-color:var(--accent); color:var(--accent); }
    .btn-danger { background:rgba(255,107,107,0.12); color:var(--error); border:1px solid rgba(255,107,107,0.3); }
    .btn-danger:hover { background:rgba(255,107,107,0.2); }

    /* Week bar */
    .week-bar { display:flex; align-items:center; gap:1rem; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1rem 1.5rem; margin-bottom:1.5rem; animation:fadeUp .4s .05s ease both; flex-wrap:wrap; }
    .week-bar label { font-size:0.78rem; text-transform:uppercase; letter-spacing:0.07em; color:var(--muted); white-space:nowrap; }
    .week-select { background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.9rem; padding:0.5rem 0.85rem; outline:none; cursor:pointer; }
    .week-select:focus { border-color:var(--accent); }
    .week-status { font-size:0.75rem; padding:0.3rem 0.75rem; border-radius:20px; }
    .status-draft    { background:rgba(251,191,36,0.12); color:var(--amber); }
    .status-published{ background:rgba(74,222,128,0.12); color:var(--green); }
    .status-archived { background:rgba(107,107,107,0.12); color:var(--muted); }

    /* New week form */
    .new-week-form { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem 1.5rem; margin-bottom:1.5rem; display:none; }
    .new-week-form.visible { display:block; }
    .new-week-form h3 { font-size:0.88rem; font-weight:500; margin-bottom:1rem; }
    .form-row { display:flex; gap:1rem; align-items:flex-end; flex-wrap:wrap; }
    .form-field { display:flex; flex-direction:column; gap:0.4rem; }
    .form-field label { font-size:0.75rem; text-transform:uppercase; letter-spacing:0.07em; color:var(--muted); }
    .form-field input { background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.9rem; padding:0.5rem 0.85rem; outline:none; }
    .form-field input:focus { border-color:var(--accent); }
    .form-field input[readonly] { color:var(--muted); cursor:not-allowed; }

    /* Day panels */
    .rota-grid { animation:fadeUp .4s .1s ease both; }
    .day-panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:1rem; overflow:hidden; }
    .day-header { display:flex; align-items:center; justify-content:space-between; padding:0.85rem 1.25rem; border-bottom:1px solid var(--border); cursor:pointer; user-select:none; }
    .day-header:hover { background:var(--surface2); }
    .day-header-left { display:flex; align-items:center; gap:0.75rem; }
    .day-name-big { font-family:'DM Serif Display',serif; font-size:1.1rem; }
    .day-date-small { font-size:0.8rem; color:var(--muted); }
    .day-today-badge { font-size:0.65rem; background:rgba(200,245,87,0.15); color:var(--accent); padding:0.15rem 0.5rem; border-radius:10px; text-transform:uppercase; letter-spacing:0.06em; }
    .day-coverage { display:flex; gap:0.5rem; align-items:center; }
    .coverage-dot { width:8px; height:8px; border-radius:50%; }
    .dot-green { background:var(--green); } .dot-amber { background:var(--amber); } .dot-red { background:var(--error); }
    .coverage-text { font-size:0.78rem; color:var(--muted); }
    .day-body { padding:1rem 1.25rem 1.25rem; display:flex; flex-direction:column; gap:1rem; }

    /* Venue sections */
    .venue-section { border:1px solid var(--border); border-radius:8px; overflow:hidden; }
    .venue-header { display:flex; align-items:center; justify-content:space-between; padding:0.65rem 1rem; border-bottom:1px solid var(--border); }
    .venue-header.main-bar { background:rgba(200,245,87,0.05); border-left:3px solid var(--accent); }
    .venue-header.wee-bar  { background:rgba(251,191,36,0.05); border-left:3px solid var(--amber); }
    .venue-header.mandela  { background:rgba(167,139,250,0.05); border-left:3px solid var(--purple); }
    .venue-header.popup    { background:rgba(249,115,22,0.05); border-left:3px solid var(--orange); }
    .venue-header.kitchen  { background:rgba(74,222,128,0.05); border-left:3px solid var(--green); }
    .venue-name { font-size:0.82rem; font-weight:500; display:flex; align-items:center; gap:0.5rem; }
    .venue-dot { width:7px; height:7px; border-radius:50%; }
    .venue-body { padding:0.75rem 1rem; display:flex; flex-direction:column; gap:0.6rem; }

    /* Venue toggle buttons */
    .venue-toggle-row { display:flex; gap:0.5rem; flex-wrap:wrap; }
    .venue-toggle { display:inline-flex; align-items:center; gap:0.35rem; font-size:0.78rem; color:var(--muted); cursor:pointer; background:var(--surface2); border:1px dashed var(--border); border-radius:20px; padding:0.3rem 0.85rem; transition:all .15s; font-family:'DM Sans',sans-serif; }
    .venue-toggle:hover { border-color:var(--accent); color:var(--accent); }

    /* Shift slots */
    .slot-row { display:grid; grid-template-columns:130px 1fr; gap:0.75rem; align-items:start; padding:0.5rem 0; border-bottom:1px solid var(--border); }
    .slot-row:last-child { border-bottom:none; padding-bottom:0; }
    .slot-label { }
    .slot-name { font-size:0.85rem; font-weight:400; }
    .slot-time { font-size:0.72rem; color:var(--muted); margin-top:0.1rem; }
    .slot-count { display:inline-flex; align-items:center; gap:0.3rem; margin-top:0.35rem; }
    .count-btn { background:none; border:none; color:var(--accent); cursor:pointer; font-size:1rem; line-height:1; padding:0; transition:opacity .15s; font-family:'DM Sans',sans-serif; }
    .count-btn:hover { opacity:0.7; }
    .count-num { font-size:0.78rem; color:var(--accent); font-weight:500; min-width:1rem; text-align:center; }
    .count-label { font-size:0.72rem; color:var(--muted); }
    .slot-content { display:flex; flex-direction:column; gap:0.4rem; }
    .assigned-list { display:flex; flex-wrap:wrap; gap:0.4rem; min-height:28px; }

    /* Staff chips */
    .staff-chip { display:flex; align-items:center; gap:0.4rem; border-radius:20px; padding:0.25rem 0.5rem 0.25rem 0.75rem; font-size:0.8rem; border:1px solid var(--border); background:var(--surface2); }
    .chip-area { font-size:0.68rem; font-weight:500; }
    .chip-area.main_bar { color:var(--accent); } .chip-area.wee_bar { color:var(--amber); }
    .chip-area.mandela  { color:var(--purple); } .chip-area.floor   { color:var(--green); }
    .chip-area.kitchen  { color:var(--green);  } .chip-area.popup   { color:var(--orange); }
    .chip-remove { background:none; border:none; color:var(--muted); cursor:pointer; font-size:0.9rem; padding:0; line-height:1; transition:color .15s; }
    .chip-remove:hover { color:var(--error); }

    /* Add staff btn */
    .add-staff-btn { display:inline-flex; align-items:center; gap:0.4rem; background:transparent; border:1px dashed var(--border); border-radius:20px; padding:0.25rem 0.75rem; font-size:0.78rem; color:var(--muted); cursor:pointer; transition:all .15s; font-family:'DM Sans',sans-serif; }
    .add-staff-btn:hover { border-color:var(--accent); color:var(--accent); }

    /* Event config row */
    .event-config { display:flex; align-items:center; gap:0.75rem; flex-wrap:wrap; padding:0.5rem 0; border-bottom:1px solid var(--border); }
    .event-config label { font-size:0.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; }
    .event-config input[type="time"] { background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.82rem; padding:0.3rem 0.6rem; outline:none; width:100px; }
    .event-config input[type="time"]:focus { border-color:var(--accent); }
    .event-config input[type="text"] { background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.82rem; padding:0.3rem 0.6rem; outline:none; width:140px; }
    .event-config input[type="text"]:focus { border-color:var(--accent); }
    .event-config-saved { font-size:0.72rem; color:var(--muted); }
    .save-event-btn { font-size:0.75rem; padding:0.3rem 0.75rem; border-radius:6px; background:rgba(200,245,87,0.1); border:1px solid rgba(200,245,87,0.3); color:var(--accent); cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .15s; }
    .save-event-btn:hover { background:rgba(200,245,87,0.2); }
    .remove-event-btn { font-size:0.75rem; padding:0.3rem 0.75rem; border-radius:6px; background:transparent; border:1px solid var(--border); color:var(--muted); cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .15s; }
    .remove-event-btn:hover { border-color:var(--error); color:var(--error); }

    /* Picker */
    .picker-overlay { position:fixed; inset:0; z-index:50; display:none; }
    .picker-overlay.open { display:block; }
    .picker { position:fixed; z-index:51; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); width:320px; max-height:420px; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 8px 32px rgba(0,0,0,0.4); }
    .picker-header { padding:0.85rem 1rem; border-bottom:1px solid var(--border); }
    .picker-title { font-size:0.85rem; font-weight:500; }
    .picker-subtitle { font-size:0.72rem; color:var(--muted); margin-top:0.2rem; }
    .picker-search { padding:0.6rem 1rem; border-bottom:1px solid var(--border); }
    .picker-search input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.85rem; padding:0.4rem 0.75rem; outline:none; }
    .picker-search input:focus { border-color:var(--accent); }
    .picker-list { overflow-y:auto; flex:1; }
    .picker-item { display:flex; align-items:center; justify-content:space-between; padding:0.65rem 1rem; cursor:pointer; border-bottom:1px solid var(--border); transition:background .1s; }
    .picker-item:hover { background:var(--surface2); }
    .picker-item.preferred { background:rgba(200,245,87,0.04); }
    .picker-item.blocked { opacity:0.4; cursor:not-allowed; }
    .picker-name { font-size:0.88rem; }
    .picker-avail { font-size:0.72rem; }
    .avail-preferred { color:var(--accent); } .avail-available { color:var(--green); }
    .avail-unavailable { color:var(--error); } .avail-none { color:var(--muted); }
    .picker-area-select { font-size:0.78rem; background:var(--surface); border:1px solid var(--border); border-radius:6px; color:var(--text); padding:0.25rem 0.5rem; cursor:pointer; outline:none; }
    .picker-empty { padding:1.5rem; text-align:center; color:var(--muted); font-size:0.85rem; }

    /* Publish bar */
    .publish-bar { position:fixed; bottom:0; left:var(--nav-w); right:0; background:var(--surface); border-top:1px solid var(--border); padding:1rem 2.5rem; display:flex; align-items:center; justify-content:space-between; z-index:20; }
    .publish-bar-left { display:flex; flex-direction:column; gap:0.2rem; }
    .publish-bar-label { font-size:0.78rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; }
    .publish-bar-week  { font-size:0.95rem; }
    .publish-bar-actions { display:flex; gap:0.75rem; }

    .toast { position:fixed; bottom:5rem; left:50%; transform:translateX(-50%) translateY(20px); background:var(--green); color:#0d0d0d; padding:0.65rem 1.5rem; border-radius:8px; font-size:0.88rem; font-weight:500; opacity:0; transition:all .3s ease; pointer-events:none; z-index:100; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .toast.error { background:var(--error); color:#fff; }
    .no-weeks { text-align:center; padding:4rem 2rem; color:var(--muted); }
    .no-weeks .big { font-family:'DM Serif Display',serif; font-size:3rem; margin-bottom:0.5rem; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @media (max-width:900px) { .nav { display:none; } .main { margin-left:0; padding:1.5rem 1rem 8rem; } .publish-bar { left:0; } .slot-row { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div class="app">
  <nav class="nav">
    <div class="nav-logo">SU Bar <span>Rota</span></div>
    <span class="nav-section">Staff</span>
    <a class="nav-link" href="index.html"><span class="icon">⊞</span> Dashboard</a>
    <a class="nav-link" href="availability.html"><span class="icon">📅</span> Availability</a>
    <a class="nav-link" href="my-shifts.html"><span class="icon">🕐</span> My Shifts</a>
    <a class="nav-link" href="swaps.html"><span class="icon">↔</span> Swap Requests</a>
    <span class="nav-section">Manager</span>
    <a class="nav-link active" href="manager.html"><span class="icon">⚙</span> Rota Builder</a>
    <a class="nav-link" href="manager-staff.html"><span class="icon">👥</span> Staff</a>
    <div class="nav-bottom">
      <div class="nav-user">
        <div class="nav-avatar" id="nav-avatar">?</div>
        <div class="nav-user-info">
          <div class="nav-user-name" id="nav-name">Loading…</div>
          <div class="nav-user-role" id="nav-role">—</div>
        </div>
      </div>
      <button class="nav-link" onclick="handleSignOut()"><span class="icon">→</span> Sign out</button>
    </div>
  </nav>

  <main class="main">
    <div class="page-header">
      <div>
        <h1 class="page-title">Rota Builder</h1>
        <p class="page-subtitle">Build the week shift by shift, venue by venue.</p>
      </div>
      <div class="header-actions">
        <button class="btn btn-outline" onclick="toggleNewWeekForm()">+ New week</button>
      </div>
    </div>

    <div class="new-week-form" id="new-week-form">
      <h3>Create a new week</h3>
      <div class="form-row">
        <div class="form-field">
          <label>Start date (Saturday)</label>
          <input type="date" id="new-start-date" onchange="updateEndDate()" />
        </div>
        <div class="form-field">
          <label>End date</label>
          <input type="date" id="new-end-date" readonly />
        </div>
        <button class="btn btn-primary" onclick="createWeek()">Create week</button>
        <button class="btn btn-outline" onclick="toggleNewWeekForm()">Cancel</button>
      </div>
    </div>

    <div class="week-bar">
      <label>Week</label>
      <select class="week-select" id="week-select" onchange="loadWeek(this.value)"></select>
      <span class="week-status" id="week-status">—</span>
      <span style="margin-left:auto;font-size:0.8rem;color:var(--muted)" id="week-range">—</span>
    </div>

    <div class="rota-grid" id="rota-grid"></div>
  </main>
</div>

<div class="picker-overlay" id="picker-overlay" onclick="closePicker()"></div>
<div class="picker" id="picker" style="display:none">
  <div class="picker-header">
    <div class="picker-title" id="picker-title">Add staff</div>
    <div class="picker-subtitle" id="picker-subtitle">—</div>
  </div>
  <div class="picker-search">
    <input type="text" id="picker-search" placeholder="Search staff…" oninput="filterPicker()" />
  </div>
  <div class="picker-list" id="picker-list"></div>
</div>

<div class="publish-bar" id="publish-bar">
  <div class="publish-bar-left">
    <span class="publish-bar-label">Currently editing</span>
    <span class="publish-bar-week" id="publish-bar-week">—</span>
  </div>
  <div class="publish-bar-actions">
    <button class="btn btn-danger" onclick="deleteWeek()">Delete week</button>
    <button class="btn btn-primary" id="btn-publish" onclick="publishRota()">Publish rota</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="env.js"></script>
<script type="module">
import { supabase, requireManager } from './src/lib/supabase.js'

// ── State ──────────────────────────────────────────────────────
let currentUser  = null
let weeks        = []
let selectedWeek = null
let templates    = []   // all shift_templates
let allStaff     = []
let availability = {}   // `${userId}_${templateId}_${date}` → status
let rotaShifts   = {}   // `${templateId}_${date}` → [{id,user_id,venue_area,status}]
let dayConfigs   = {}   // `${templateId}_${date}` → {id,required_staff,start_time,end_time,notes}
let pickerCtx    = null // {templateId,dateStr,customStart,customEnd,venueKey}
const todayStr   = new Date().toISOString().split('T')[0]

// Venue definitions — order matters for display
const VENUES = [
  { key:'main_bar', label:'Main Bar',  colorClass:'main-bar', dot:'var(--accent)',  area:'main_bar', adhoc:false },
  { key:'wee_bar',  label:'Wee Bar',   colorClass:'wee-bar',  dot:'var(--amber)',   area:'wee_bar',  adhoc:true  },
  { key:'mandela',  label:'Mandela',   colorClass:'mandela',  dot:'var(--purple)',  area:'mandela',  adhoc:true  },
  { key:'popup',    label:'Pop-up Bar',colorClass:'popup',    dot:'var(--orange)',  area:'popup',    adhoc:true  },
  { key:'kitchen',  label:'Kitchen',   colorClass:'kitchen',  dot:'var(--green)',   area:'kitchen',  adhoc:false },
]

// ── Auth ───────────────────────────────────────────────────────
currentUser = await requireManager()
if (!currentUser) throw new Error('Not a manager')
const initials = currentUser.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2)
document.getElementById('nav-avatar').textContent = initials
document.getElementById('nav-name').textContent   = currentUser.name
document.getElementById('nav-role').textContent   = currentUser.role
window.handleSignOut = async () => { await supabase.auth.signOut(); window.location.href='/login.html' }

// ── Load templates & staff ─────────────────────────────────────
const { data:tplData } = await supabase.from('shift_templates').select('*,roles(*)').order('start_time')
templates = tplData ?? []

const { data:staffData } = await supabase.from('users').select('*,user_roles(*,roles(*))').eq('active',true).order('name')
allStaff = staffData ?? []

// ── Load week ─────────────────────────────────────────────────
window.loadWeek = async (weekId) => {
  selectedWeek = weeks.find(w => w.id === weekId)
  if (!selectedWeek) return

  const statusEl = document.getElementById('week-status')
  statusEl.className   = `week-status status-${selectedWeek.status}`
  statusEl.textContent = selectedWeek.status.charAt(0).toUpperCase() + selectedWeek.status.slice(1)

  const fmt = d => new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'long'})
  const rangeStr = `${fmt(selectedWeek.start_date)} – ${fmt(selectedWeek.end_date)}`
  document.getElementById('week-range').textContent       = rangeStr
  document.getElementById('publish-bar-week').textContent = rangeStr

  const publishBtn = document.getElementById('btn-publish')
  publishBtn.textContent = selectedWeek.status === 'published' ? 'Republish' : 'Publish rota'

  // Load availability
  const { data:avData } = await supabase.from('availability').select('*').eq('fortnight_id', weekId)
  availability = {}
  ;(avData ?? []).forEach(a => { availability[`${a.user_id}_${a.shift_template_id}_${a.shift_date}`] = a.status })

  // Load rota shifts
  const { data:rsData } = await supabase.from('rota_shifts').select('*').eq('fortnight_id', weekId)
  rotaShifts = {}
  ;(rsData ?? []).forEach(rs => {
    const key = `${rs.shift_template_id}_${rs.shift_date}`
    if (!rotaShifts[key]) rotaShifts[key] = []
    rotaShifts[key].push({ id:rs.id, user_id:rs.user_id, venue_area:rs.venue_area, status:rs.status })
  })

  // Load day configs
  const { data:dcData } = await supabase.from('shift_day_config').select('*').eq('fortnight_id', weekId)
  dayConfigs = {}
  ;(dcData ?? []).forEach(dc => {
    dayConfigs[`${dc.shift_template_id}_${dc.shift_date}`] = {
      id: dc.id, required_staff: dc.required_staff,
      start_time: dc.start_time, end_time: dc.end_time, notes: dc.notes
    }
  })

  renderGrid()
}

// ── Load weeks ────────────────────────────────────────────────
window.loadWeek = window.loadWeek  // hoisting safety

await loadWeeks()
async function loadWeeks() {
  const { data } = await supabase.from('fortnights').select('*').order('start_date',{ascending:false})
  weeks = data ?? []
  const sel = document.getElementById('week-select')
  sel.innerHTML = ''
  if (weeks.length === 0) {
    document.getElementById('rota-grid').innerHTML = '<div class="no-weeks"><div class="big">📋</div><p>No weeks yet. Create one to get started.</p></div>'
    document.getElementById('publish-bar').style.display = 'none'
    return
  }
  weeks.forEach(w => {
    const fmt = d => new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'})
    const opt = document.createElement('option')
    opt.value = w.id
    opt.textContent = `w/c ${fmt(w.start_date)} – ${fmt(w.end_date)}`
    sel.appendChild(opt)
  })
  await window.loadWeek(weeks[0].id)
}

// ── Render grid ───────────────────────────────────────────────
function renderGrid() {
  const container = document.getElementById('rota-grid')
  container.innerHTML = ''
  const [sy,sm,sd] = selectedWeek.start_date.split('-').map(Number)
  const start = new Date(sy, sm-1, sd)
  const dates = Array.from({length:7},(_,i) => { const d=new Date(start); d.setDate(start.getDate()+i); return d })

  dates.forEach(date => {
    const dateStr  = date.toISOString().split('T')[0]
    const dayName  = date.toLocaleDateString('en-GB',{weekday:'long'})
    const dayShort = date.toLocaleDateString('en-GB',{day:'numeric',month:'short'})
    const isToday  = dateStr === todayStr

    // Coverage
    let assigned=0, needed=0
    templates.forEach(t => {
      const key = `${t.id}_${dateStr}`
      const dc  = dayConfigs[key]
      // Regular slots always show; adhoc only if config exists
      if (t.is_adhoc && !dc) return
      assigned += (rotaShifts[key]??[]).filter(s=>s.status!=='cancelled').length
      needed   += dc?.required_staff ?? t.min_staff
    })
    // popup venue (no template) — check shift_day_config with template_id null workaround via venue key
    const popupKey = `popup_${dateStr}`
    if (dayConfigs[popupKey]) {
      assigned += (rotaShifts[popupKey]??[]).filter(s=>s.status!=='cancelled').length
      needed   += dayConfigs[popupKey].required_staff ?? 1
    }

    const dotColor = assigned>=needed ? 'dot-green' : assigned>0 ? 'dot-amber' : 'dot-red'

    const panel = document.createElement('div')
    panel.className = 'day-panel'
    panel.innerHTML = `
      <div class="day-header" onclick="toggleDay('body-${dateStr}')">
        <div class="day-header-left">
          <span class="day-name-big">${dayName}</span>
          <span class="day-date-small">${dayShort}</span>
          ${isToday?'<span class="day-today-badge">Today</span>':''}
        </div>
        <div class="day-coverage">
          <div class="coverage-dot ${dotColor}"></div>
          <span class="coverage-text">${assigned}/${needed} filled</span>
          <span style="color:var(--muted);font-size:0.85rem;margin-left:0.25rem">▾</span>
        </div>
      </div>
      <div class="day-body" id="body-${dateStr}"></div>`

    const body = panel.querySelector(`#body-${dateStr}`)

    // Main Bar venue section
    renderMainBarSection(body, dateStr)

    // Wee Bar, Mandela, Pop-up — togglable event venues
    renderEventVenueSection(body, dateStr, 'wee_bar',  'wee-bar',  'Wee Bar',   'var(--amber)')
    renderEventVenueSection(body, dateStr, 'mandela',  'mandela',  'Mandela',   'var(--purple)')
    renderEventVenueSection(body, dateStr, 'popup',    'popup',    'Pop-up Bar','var(--orange)')

    // Kitchen venue section
    renderKitchenSection(body, dateStr)

    container.appendChild(panel)
  })
}

// ── Main Bar section ──────────────────────────────────────────
function renderMainBarSection(body, dateStr) {
  const mainBarTpls = templates.filter(t => !t.is_adhoc && t.roles?.name === 'bar')
  if (mainBarTpls.length === 0) return

  const section = document.createElement('div')
  section.className = 'venue-section'
  section.innerHTML = `
    <div class="venue-header main-bar">
      <div class="venue-name">
        <div class="venue-dot" style="background:var(--accent)"></div>
        Main Bar
      </div>
    </div>
    <div class="venue-body" id="main-bar-body-${dateStr}"></div>`
  const vBody = section.querySelector(`#main-bar-body-${dateStr}`)

  mainBarTpls.forEach(tpl => {
    const key      = `${tpl.id}_${dateStr}`
    const dc       = dayConfigs[key]
    const required = dc?.required_staff ?? tpl.min_staff
    const assigned = (rotaShifts[key]??[]).filter(s=>s.status!=='cancelled')
    vBody.appendChild(buildSlotRow(tpl.id, tpl.name, tpl.start_time, tpl.end_time, dateStr, key, required, assigned, 'main_bar', false))
  })

  body.appendChild(section)
}

// ── Kitchen section ───────────────────────────────────────────
function renderKitchenSection(body, dateStr) {
  const kpTpls = templates.filter(t => !t.is_adhoc && t.roles?.name === 'kp')
  if (kpTpls.length === 0) return

  const section = document.createElement('div')
  section.className = 'venue-section'
  section.innerHTML = `
    <div class="venue-header kitchen">
      <div class="venue-name">
        <div class="venue-dot" style="background:var(--green)"></div>
        Kitchen
      </div>
    </div>
    <div class="venue-body" id="kitchen-body-${dateStr}"></div>`

  kpTpls.forEach(tpl => {
    const key      = `${tpl.id}_${dateStr}`
    const dc       = dayConfigs[key]
    const required = dc?.required_staff ?? tpl.min_staff
    const assigned = (rotaShifts[key]??[]).filter(s=>s.status!=='cancelled')
    vBody.appendChild(buildSlotRow(tpl.id, tpl.name, tpl.start_time, tpl.end_time, dateStr, key, required, assigned, 'kitchen', false))

// ── Event venue section (Wee Bar, Mandela, Pop-up) ───────────
function renderEventVenueSection(body, dateStr, venueKey, colorClass, label, dotColor) {
  // For popup, we use venueKey as the fake templateId since there's no real template
  const isPopup    = venueKey === 'popup'
  const configKey  = isPopup ? `popup_${dateStr}` : null

  // For non-popup: find the adhoc template matching this venue
  let tpl = null
  if (!isPopup) {
    tpl = templates.find(t => t.is_adhoc && t.venue_area === venueKey)
    if (!tpl) return // no template for this venue, skip
  }

  const key    = isPopup ? configKey : `${tpl.id}_${dateStr}`
  const dc     = dayConfigs[key]
  const active = !!dc

  const section = document.createElement('div')
  section.className = 'venue-section'
  section.id = `venue-section-${venueKey}-${dateStr}`

  const headerHTML = `
    <div class="venue-header ${colorClass}">
      <div class="venue-name">
        <div class="venue-dot" style="background:${dotColor}"></div>
        ${label}
      </div>
      <div style="display:flex;gap:0.5rem;align-items:center">
        ${active
          ? `<button class="remove-event-btn" onclick="toggleEventVenue('${venueKey}','${dateStr}',false)">Remove</button>`
          : `<button class="venue-toggle" onclick="toggleEventVenue('${venueKey}','${dateStr}',true)">+ Add to rota</button>`
        }
      </div>
    </div>`

  section.innerHTML = headerHTML

  if (active) {
    const vBody = document.createElement('div')
    vBody.className = 'venue-body'

    // Time config row
    const configRow = document.createElement('div')
    configRow.className = 'event-config'
    configRow.innerHTML = `
      <label>Start</label>
      <input type="time" id="start-${venueKey}-${dateStr}" value="${dc.start_time??''}" onchange="saveEventConfig('${venueKey}','${dateStr}')" />
      <label>End</label>
      <input type="time" id="end-${venueKey}-${dateStr}" value="${dc.end_time??''}" onchange="saveEventConfig('${venueKey}','${dateStr}')" />
      ${isPopup ? `<label>Name</label><input type="text" id="name-${venueKey}-${dateStr}" value="${dc.notes??'Pop-up Bar'}" placeholder="e.g. Freshers Bar" onchange="saveEventConfig('${venueKey}','${dateStr}')" />` : ''}
    `
    vBody.appendChild(configRow)

    // Slot row for assigned staff
    const assigned  = (rotaShifts[key]??[]).filter(s=>s.status!=='cancelled')
    const required  = dc.required_staff ?? 1
    const startT    = dc.start_time ?? '18:00'
    const endT      = dc.end_time   ?? '23:00'
    const slotName  = isPopup ? (dc.notes||'Pop-up Bar') : label
    const fakeId    = isPopup ? 'popup' : tpl.id
    vBody.appendChild(buildSlotRow(fakeId, slotName, startT, endT, dateStr, key, required, assigned, venueKey, true))

    section.appendChild(vBody)
  }

  body.appendChild(section)
}

// ── Build a slot row ──────────────────────────────────────────
function buildSlotRow(templateId, name, startTime, endTime, dateStr, key, required, assigned, defaultArea, isEvent) {
  const row = document.createElement('div')
  row.className = 'slot-row'
  row.id = `slot-${key}`

  const startDisp = typeof startTime === 'string' ? startTime.slice(0,5) : '--:--'
  const endDisp   = typeof endTime   === 'string' ? endTime.slice(0,5)   : '--:--'

  row.innerHTML = `
    <div class="slot-label">
      <div class="slot-name">${name}</div>
      <div class="slot-time">${startDisp} – ${endDisp}</div>
      <div class="slot-count">
        <button class="count-btn" onclick="updateRequired('${templateId}','${dateStr}',-1)">−</button>
        <span class="count-num" id="req-${key}">${required}</span>
        <button class="count-btn" onclick="updateRequired('${templateId}','${dateStr}',1)">+</button>
        <span class="count-label">needed</span>
      </div>
    </div>
    <div class="slot-content">
      <div class="assigned-list" id="assigned-${key}"></div>
      <button class="add-staff-btn" onclick="openPicker('${templateId}','${dateStr}','${defaultArea}',this)">+ Add staff</button>
    </div>`

  const list = row.querySelector(`#assigned-${key}`)
  assigned.forEach(rs => {
    const s = allStaff.find(x => x.id === rs.user_id)
    if (s) list.appendChild(buildChip(rs, s, templateId, dateStr))
  })

  return row
}

// ── Chip ──────────────────────────────────────────────────────
function buildChip(rs, staffMember, templateId, dateStr) {
  const areaLabels = { main_bar:'Bar', wee_bar:'Wee Bar', mandela:'Mandela', floor:'Floor', kitchen:'KP', popup:'Pop-up' }
  const chip = document.createElement('div')
  chip.className = 'staff-chip'
  chip.id = `chip-${rs.id}`
  chip.innerHTML = `
    <span>${staffMember.name.split(' ')[0]}</span>
    <span class="chip-area ${rs.venue_area}">${areaLabels[rs.venue_area]??rs.venue_area}</span>
    <button class="chip-remove" onclick="removeShift('${rs.id}','${templateId}','${dateStr}')">×</button>`
  return chip
}

// ── Toggle event venue on/off ─────────────────────────────────
window.toggleEventVenue = async (venueKey, dateStr, enable) => {
  const isPopup   = venueKey === 'popup'
  const configKey = isPopup ? `popup_${dateStr}` : null
  const tpl       = !isPopup ? templates.find(t => t.is_adhoc && t.venue_area === venueKey) : null
  const key       = isPopup ? configKey : `${tpl?.id}_${dateStr}`

  if (enable) {
    const defaultStart = tpl?.start_time ?? '18:00:00'
    const defaultEnd   = tpl?.end_time   ?? '23:00:00'
    const { data, error } = await supabase.from('shift_day_config').insert({
      fortnight_id:      selectedWeek.id,
      shift_template_id: tpl?.id ?? null,
      shift_date:        dateStr,
      required_staff:    tpl?.min_staff ?? 2,
      start_time:        defaultStart,
      end_time:          defaultEnd,
      notes:             isPopup ? 'Pop-up Bar' : null,
    }).select().single()
    if (!error && data) dayConfigs[key] = { id:data.id, required_staff:data.required_staff, start_time:data.start_time, end_time:data.end_time, notes:data.notes }
  } else {
    const dc = dayConfigs[key]
    if (dc) {
      await supabase.from('shift_day_config').delete().eq('id', dc.id)
      // Remove assigned shifts
      for (const rs of (rotaShifts[key]??[])) await supabase.from('rota_shifts').delete().eq('id', rs.id)
      delete dayConfigs[key]
      delete rotaShifts[key]
    }
  }
  renderGrid()
}

// ── Save event config (times/name) ───────────────────────────
window.saveEventConfig = async (venueKey, dateStr) => {
  const isPopup   = venueKey === 'popup'
  const key       = isPopup ? `popup_${dateStr}` : (() => { const t=templates.find(t=>t.is_adhoc&&t.venue_area===venueKey); return t?`${t.id}_${dateStr}`:null })()
  if (!key) return
  const dc = dayConfigs[key]
  if (!dc) return

  const startEl = document.getElementById(`start-${venueKey}-${dateStr}`)
  const endEl   = document.getElementById(`end-${venueKey}-${dateStr}`)
  const nameEl  = document.getElementById(`name-${venueKey}-${dateStr}`)

  const updates = {
    start_time: startEl?.value || dc.start_time,
    end_time:   endEl?.value   || dc.end_time,
    notes:      nameEl?.value  || dc.notes,
  }

  await supabase.from('shift_day_config').update(updates).eq('id', dc.id)
  Object.assign(dayConfigs[key], updates)
}

// ── Update required staff count ───────────────────────────────
window.updateRequired = async (templateId, dateStr, delta) => {
  const isPopup = templateId === 'popup'
  const key     = isPopup ? `popup_${dateStr}` : `${templateId}_${dateStr}`
  const dc      = dayConfigs[key]
  const tpl     = templates.find(t => t.id === templateId)
  const current = dc?.required_staff ?? tpl?.min_staff ?? 1
  const newCount = Math.max(1, current + delta)

  if (dc) {
    await supabase.from('shift_day_config').update({ required_staff:newCount }).eq('id', dc.id)
    dayConfigs[key].required_staff = newCount
  } else {
    const { data } = await supabase.from('shift_day_config').insert({
      fortnight_id:selectedWeek.id, shift_template_id:templateId==='popup'?null:templateId,
      shift_date:dateStr, required_staff:newCount,
      start_time:tpl?.start_time??'18:00', end_time:tpl?.end_time??'23:00',
    }).select().single()
    if (data) dayConfigs[key] = { id:data.id, required_staff:newCount }
  }

  const numEl = document.getElementById(`req-${key}`)
  if (numEl) numEl.textContent = newCount
  updateDayCoverage(dateStr)
}

// ── Picker ────────────────────────────────────────────────────
window.openPicker = (templateId, dateStr, defaultArea, btn) => {
  const isPopup   = templateId === 'popup'
  const configKey = isPopup ? `popup_${dateStr}` : `${templateId}_${dateStr}`
  const dc        = dayConfigs[configKey]
  const tpl       = templates.find(t => t.id === templateId)

  // Get effective start/end for overlap check
  const effectiveStart = dc?.start_time ?? tpl?.start_time ?? '00:00'
  const effectiveEnd   = dc?.end_time   ?? tpl?.end_time   ?? '23:59'

  pickerCtx = { templateId, dateStr, defaultArea, configKey, effectiveStart, effectiveEnd }

  const already = (rotaShifts[configKey]??[]).map(rs=>rs.user_id)
  const title   = isPopup ? (dc?.notes||'Pop-up Bar') : (tpl?.name ?? defaultArea)

  document.getElementById('picker-title').textContent    = `Add to ${title}`
  document.getElementById('picker-subtitle').textContent = new Date(dateStr).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long'})
  document.getElementById('picker-search').value         = ''

  const rect   = btn.getBoundingClientRect()
  const picker = document.getElementById('picker')
  picker.style.display = 'flex'
  picker.style.top  = `${Math.min(rect.bottom+8, window.innerHeight-440)}px`
  picker.style.left = `${Math.min(rect.left, window.innerWidth-340)}px`
  document.getElementById('picker-overlay').classList.add('open')

  buildPickerList(already, '')
}

function timeToMins(t) {
  const [h,m] = (t||'00:00').slice(0,5).split(':').map(Number)
  return h*60+m
}

function timesOverlap(aStart, aEnd, bStart, bEnd) {
  let as=timeToMins(aStart), ae=timeToMins(aEnd), bs=timeToMins(bStart), be=timeToMins(bEnd)
  if (ae<=as) ae+=1440
  if (be<=bs) be+=1440
  return as<be && bs<ae
}

function buildPickerList(alreadyAssigned, search) {
  const list = document.getElementById('picker-list')
  list.innerHTML = ''
  const { templateId, dateStr, defaultArea, effectiveStart, effectiveEnd } = pickerCtx

  // Role filter — popup/event bar staff; kitchen = kp
  const isKitchen = defaultArea === 'kitchen'
  const eligible  = allStaff.filter(s => {
    const roleMatch = isKitchen
      ? s.user_roles?.some(ur => ur.roles?.name === 'kp')
      : s.user_roles?.some(ur => ur.roles?.name === 'bar')
    return roleMatch && s.name.toLowerCase().includes(search.toLowerCase())
  })

  if (eligible.length === 0) { list.innerHTML='<div class="picker-empty">No matching staff found</div>'; return }

  // Sort by availability status
  const order = { preferred:0, available:1, null:2, unavailable:3 }
  eligible.sort((a,b) => {
    const ak = availability[`${a.id}_${templateId}_${dateStr}`] ?? null
    const bk = availability[`${b.id}_${templateId}_${dateStr}`] ?? null
    return (order[ak]??2)-(order[bk]??2)
  })

  // Area options
  const areaOptions = isKitchen
    ? '<option value="kitchen">Kitchen</option>'
    : `<option value="main_bar">Main Bar</option><option value="wee_bar">Wee Bar</option><option value="mandela">Mandela</option><option value="floor">Floor</option><option value="popup">Pop-up</option>`

  eligible.forEach(s => {
    const avKey  = `${s.id}_${templateId}_${dateStr}`
    const status = availability[avKey] ?? null
    const already = alreadyAssigned.includes(s.id)

    // Check shift clashes using effective times
    const clashTpl = templates.find(t => {
      const k = `${t.id}_${dateStr}`
      return (rotaShifts[k]??[]).some(rs => rs.user_id===s.id && rs.status!=='cancelled')
        && timesOverlap(effectiveStart, effectiveEnd, dc?.start_time??t.start_time, dc?.end_time??t.end_time)
    })
    // Also check event venues
    const clashEvent = !clashTpl && Object.entries(rotaShifts).some(([k, shifts]) => {
      if (!k.endsWith(`_${dateStr}`)) return false
      if (!shifts.some(rs => rs.user_id===s.id)) return false
      const dc2 = dayConfigs[k]
      if (!dc2) return false
      return timesOverlap(effectiveStart, effectiveEnd, dc2.start_time??'', dc2.end_time??'')
    })

    const hasClash = !already && (!!clashTpl || clashEvent)
    const blocked  = already || hasClash

    const statusLabel = already    ? '<span class="avail-none">Added</span>'
                      : hasClash   ? '<span class="avail-unavailable">⚠ Clash</span>'
                      : status==='preferred'   ? '<span class="avail-preferred">★ Preferred</span>'
                      : status==='available'   ? '<span class="avail-available">✓ Available</span>'
                      : status==='unavailable' ? '<span class="avail-unavailable">✕ Unavailable</span>'
                      : '<span class="avail-none">No response</span>'

    const item = document.createElement('div')
    item.className = `picker-item${status==='preferred'&&!blocked?' preferred':''}${blocked?' blocked':''}`
    item.innerHTML = `
      <div>
        <div class="picker-name">${s.name}</div>
        <div class="picker-avail">${statusLabel}</div>
      </div>
      ${!blocked
        ? `<select class="picker-area-select" id="area-${s.id}" onclick="event.stopPropagation()">${areaOptions}</select>`
        : `<span style="font-size:0.72rem;color:var(--muted)">${already?'Added':'Clash'}</span>`}`

    if (!blocked) {
      // Pre-select area based on venue context
      item.addEventListener('click', () => assignStaff(s))
    }
    list.appendChild(item)
  })
}

window.filterPicker = () => {
  if (!pickerCtx) return
  const already = (rotaShifts[pickerCtx.configKey]??[]).map(rs=>rs.user_id)
  buildPickerList(already, document.getElementById('picker-search').value)
}

window.closePicker = () => {
  document.getElementById('picker').style.display = 'none'
  document.getElementById('picker-overlay').classList.remove('open')
  pickerCtx = null
}

// ── Assign staff ──────────────────────────────────────────────
async function assignStaff(staffMember) {
  const { templateId, dateStr, defaultArea, configKey } = pickerCtx
  const areaEl    = document.getElementById(`area-${staffMember.id}`)
  const venueArea = areaEl?.value ?? defaultArea
  const isPopup   = templateId === 'popup'

  const { data, error } = await supabase.from('rota_shifts').insert({
    fortnight_id:      selectedWeek.id,
    user_id:           staffMember.id,
    shift_template_id: isPopup ? null : templateId,
    shift_date:        dateStr,
    venue_area:        venueArea,
    status:            'scheduled',
    created_by:        currentUser.id,
  }).select().single()

  if (error) { console.error(error); showToast('Error assigning shift', true); return }

  if (!rotaShifts[configKey]) rotaShifts[configKey] = []
  rotaShifts[configKey].push({ id:data.id, user_id:staffMember.id, venue_area:venueArea, status:'scheduled' })

  const list = document.getElementById(`assigned-${configKey}`)
  if (list) list.appendChild(buildChip({ id:data.id, user_id:staffMember.id, venue_area:venueArea }, staffMember, templateId, dateStr))

  closePicker()
  updateDayCoverage(dateStr)
}

// ── Remove shift ──────────────────────────────────────────────
window.removeShift = async (shiftId, templateId, dateStr) => {
  const { error } = await supabase.from('rota_shifts').delete().eq('id', shiftId)
  if (error) { showToast('Error removing shift', true); return }

  const isPopup   = templateId === 'popup'
  const configKey = isPopup ? `popup_${dateStr}` : `${templateId}_${dateStr}`
  rotaShifts[configKey] = (rotaShifts[configKey]??[]).filter(rs=>rs.id!==shiftId)
  document.getElementById(`chip-${shiftId}`)?.remove()
  updateDayCoverage(dateStr)
}

// ── Coverage update ───────────────────────────────────────────
function updateDayCoverage(dateStr) {
  let assigned=0, needed=0
  templates.forEach(t => {
    const key=`${t.id}_${dateStr}`, dc=dayConfigs[key]
    if (t.is_adhoc && !dc) return
    assigned += (rotaShifts[key]??[]).filter(s=>s.status!=='cancelled').length
    needed   += dc?.required_staff ?? t.min_staff
  })
  const popKey=`popup_${dateStr}`
  if (dayConfigs[popKey]) {
    assigned += (rotaShifts[popKey]??[]).filter(s=>s.status!=='cancelled').length
    needed   += dayConfigs[popKey].required_staff ?? 1
  }
  const color = assigned>=needed?'dot-green':assigned>0?'dot-amber':'dot-red'
  document.querySelectorAll('.day-panel').forEach(panel => {
    if (!panel.querySelector(`#body-${dateStr}`)) return
    const dot  = panel.querySelector('.coverage-dot')
    const text = panel.querySelector('.coverage-text')
    if (dot)  dot.className  = `coverage-dot ${color}`
    if (text) text.textContent = `${assigned}/${needed} filled`
  })
}

// ── Toggle day ────────────────────────────────────────────────
window.toggleDay = (id) => {
  const el = document.getElementById(id)
  el.style.display = el.style.display==='none' ? '' : 'none'
}

// ── New week form ─────────────────────────────────────────────
window.toggleNewWeekForm = () => {
  const form = document.getElementById('new-week-form')
  form.classList.toggle('visible')
  if (form.classList.contains('visible')) {
    const d=new Date(), day=d.getDay()
    d.setDate(d.getDate() + ((6-day+7)%7||7))
    document.getElementById('new-start-date').value = d.toISOString().split('T')[0]
    updateEndDate()
  }
}

window.updateEndDate = () => {
  const start = document.getElementById('new-start-date').value
  if (!start) return
  const end = new Date(start); end.setDate(end.getDate()+6)
  document.getElementById('new-end-date').value = end.toISOString().split('T')[0]
}

window.createWeek = async () => {
  const startDate = document.getElementById('new-start-date').value
  const endDate   = document.getElementById('new-end-date').value
  if (!startDate||!endDate) { showToast('Please select a start date',true); return }
  const { data, error } = await supabase.from('fortnights').insert({ start_date:startDate, end_date:endDate, status:'draft' }).select().single()
  if (error) { showToast('Error creating week',true); return }
  showToast('Week created!')
  document.getElementById('new-week-form').classList.remove('visible')
  await loadWeeks()
  document.getElementById('week-select').value = data.id
  await window.loadWeek(data.id)
}

// ── Publish rota ──────────────────────────────────────────────
window.publishRota = async () => {
  if (!selectedWeek) return
  const confirmed = confirm(selectedWeek.status==='published'
    ? 'Republish the rota? Staff will be notified of changes.'
    : 'Publish this rota? All assigned staff will be notified.')
  if (!confirmed) return

  const btn = document.getElementById('btn-publish')
  btn.disabled=true; btn.textContent='Publishing…'

  const { error } = await supabase.from('fortnights').update({ status:'published', published_at:new Date().toISOString() }).eq('id', selectedWeek.id)
  if (error) { showToast('Error publishing',true); btn.disabled=false; btn.textContent='Publish rota'; return }

  const assignedIds = [...new Set(Object.values(rotaShifts).flat().map(rs=>rs.user_id))]
  const fmt = d => new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'})
  const weekLabel = `${fmt(selectedWeek.start_date)} – ${fmt(selectedWeek.end_date)}`

  if (assignedIds.length > 0) {
    await supabase.from('notifications').insert(assignedIds.map(uid => ({
      user_id:uid, type:'rota_published',
      message:`The rota for w/c ${weekLabel} has been published. Check your shifts!`, read:false
    })))
  }

  selectedWeek.status='published'
  document.getElementById('week-status').className='week-status status-published'
  document.getElementById('week-status').textContent='Published'
  btn.textContent='Republish'; btn.disabled=false
  showToast(`Rota published! ${assignedIds.length} staff notified.`)
}

// ── Delete week ───────────────────────────────────────────────
window.deleteWeek = async () => {
  if (!selectedWeek) return
  if (!confirm(`Delete the week of ${selectedWeek.start_date}? This cannot be undone.`)) return
  await supabase.from('rota_shifts').delete().eq('fortnight_id', selectedWeek.id)
  await supabase.from('availability').delete().eq('fortnight_id', selectedWeek.id)
  await supabase.from('shift_day_config').delete().eq('fortnight_id', selectedWeek.id)
  await supabase.from('fortnights').delete().eq('id', selectedWeek.id)
  showToast('Week deleted')
  await loadWeeks()
}

function showToast(msg, isError=false) {
  const t=document.getElementById('toast')
  t.textContent=msg; t.className=`toast${isError?' error':''} show`
  setTimeout(()=>t.classList.remove('show'),3000)
}
</script>
