<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SU Bar Rota — Rota Builder</title>

  <link rel="manifest" href="/manifest.json" />
<meta name="theme-color" content="#0d0d0d" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Rota" />
  <link rel="apple-touch-icon" sizes="192x192" href="/icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0d0d0d; --surface: #161616; --surface2: #1e1e1e;
      --border:  #2a2a2a; --accent: #c8f557; --text: #f0ede6;
      --muted:   #6b6b6b; --error: #ff6b6b; --green: #4ade80;
      --amber:   #fbbf24; --purple: #a78bfa; --orange: #fb923c;
      --radius:  10px; --nav-w: 240px;
    }
    html, body { height:100%; background:var(--bg); color:var(--text); font-family:'DM Sans',sans-serif; font-weight:300; }
    body::before { content:''; position:fixed; inset:0; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E"); opacity:.03; pointer-events:none; z-index:0; }
    .app { position:relative; z-index:1; display:flex; min-height:100vh; }

    .nav { width:var(--nav-w); background:var(--surface); border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; top:0; left:0; bottom:0; padding:1.75rem 1rem; z-index:10; }
    .nav-logo { font-family:'DM Serif Display',serif; font-size:1rem; padding:0 0.5rem; margin-bottom:2rem; }
    .nav-logo span { color:var(--accent); }
    .nav-section { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--muted); padding:0 0.5rem; margin:1rem 0 0.4rem; }
    .nav-link { display:flex; align-items:center; gap:0.65rem; padding:0.6rem 0.75rem; border-radius:8px; color:var(--muted); text-decoration:none; font-size:0.88rem; transition:background .15s,color .15s; cursor:pointer; border:none; background:none; width:100%; text-align:left; }
    .nav-link:hover { background:var(--surface2); color:var(--text); }
    .nav-link.active { background:rgba(200,245,87,0.1); color:var(--accent); }
    .nav-link .icon { font-size:1rem; width:1.2rem; text-align:center; }
    .nav-bottom { margin-top:auto; }
    .nav-user { display:flex; align-items:center; gap:0.65rem; padding:0.75rem; border-radius:8px; border:1px solid var(--border); margin-bottom:0.5rem; }
    .nav-avatar { width:32px; height:32px; border-radius:50%; background:var(--accent); color:#0d0d0d; display:flex; align-items:center; justify-content:center; font-size:0.8rem; font-weight:500; flex-shrink:0; }
    .nav-user-name { font-size:0.85rem; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .nav-user-role { font-size:0.72rem; color:var(--muted); text-transform:capitalize; }

    .main { margin-left:var(--nav-w); flex:1; padding:2.5rem 2.5rem 8rem; transition:padding-right .25s ease; }
    .main.panel-open { padding-right: 316px; }
    .page-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:2rem; animation:fadeUp .4s ease both; flex-wrap:wrap; gap:1rem; }
    .page-title { font-family:'DM Serif Display',serif; font-size:2rem; font-weight:400; }
    .page-subtitle { color:var(--muted); font-size:0.9rem; margin-top:0.25rem; }
    .header-actions { display:flex; gap:0.75rem; align-items:center; }

    .btn { padding:0.6rem 1.25rem; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:0.88rem; font-weight:500; cursor:pointer; border:none; transition:all .15s; }
    .btn-primary { background:var(--accent); color:#0d0d0d; }
    .btn-primary:hover { background:#d4f96e; }
    .btn-primary:disabled { background:var(--border); color:var(--muted); cursor:not-allowed; }
    .btn-outline { background:transparent; color:var(--text); border:1px solid var(--border); }
    .btn-outline:hover { border-color:var(--accent); color:var(--accent); }
    .btn-danger { background:rgba(255,107,107,0.12); color:var(--error); border:1px solid rgba(255,107,107,0.3); }
    .btn-danger:hover { background:rgba(255,107,107,0.2); }

    .week-bar { display:flex; align-items:center; gap:1rem; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1rem 1.5rem; margin-bottom:1.5rem; animation:fadeUp .4s .05s ease both; flex-wrap:wrap; }
    .week-bar label { font-size:0.78rem; text-transform:uppercase; letter-spacing:0.07em; color:var(--muted); white-space:nowrap; }
    .week-select { background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.9rem; padding:0.5rem 0.85rem; outline:none; cursor:pointer; }
    .week-select:focus { border-color:var(--accent); }
    .week-status { font-size:0.75rem; padding:0.3rem 0.75rem; border-radius:20px; }
    .status-draft    { background:rgba(251,191,36,0.12); color:var(--amber); }
    .status-published{ background:rgba(74,222,128,0.12); color:var(--green); }
    .status-archived { background:rgba(107,107,107,0.12); color:var(--muted); }

    .new-week-form { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:1.25rem 1.5rem; margin-bottom:1.5rem; display:none; }
    .new-week-form.visible { display:block; }
    .new-week-form h3 { font-size:0.88rem; font-weight:500; margin-bottom:1rem; }
    .form-row { display:flex; gap:1rem; align-items:flex-end; flex-wrap:wrap; }
    .form-field { display:flex; flex-direction:column; gap:0.4rem; }
    .form-field label { font-size:0.75rem; text-transform:uppercase; letter-spacing:0.07em; color:var(--muted); }
    .form-field input { background:var(--surface2); border:1px solid var(--border); border-radius:8px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.9rem; padding:0.5rem 0.85rem; outline:none; }
    .form-field input:focus { border-color:var(--accent); }
    .form-field input[readonly] { color:var(--muted); cursor:not-allowed; }

    .rota-grid { animation:fadeUp .4s .1s ease both; }
    .day-panel { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); margin-bottom:1rem; overflow:hidden; }
    .day-header { display:flex; align-items:center; justify-content:space-between; padding:0.85rem 1.25rem; border-bottom:1px solid var(--border); cursor:pointer; user-select:none; }
    .day-header:hover { background:var(--surface2); }
    .day-header-left { display:flex; align-items:center; gap:0.75rem; }
    .day-name-big { font-family:'DM Serif Display',serif; font-size:1.1rem; }
    .day-date-small { font-size:0.8rem; color:var(--muted); }
    .day-today-badge { font-size:0.65rem; background:rgba(200,245,87,0.15); color:var(--accent); padding:0.15rem 0.5rem; border-radius:10px; text-transform:uppercase; letter-spacing:0.06em; }
    .day-coverage { display:flex; gap:0.5rem; align-items:center; }
    .coverage-dot { width:8px; height:8px; border-radius:50%; }
    .dot-green { background:var(--green); } .dot-amber { background:var(--amber); } .dot-red { background:var(--error); }
    .coverage-text { font-size:0.78rem; color:var(--muted); }
    .day-body { padding:1rem 1.25rem 1.25rem; display:flex; flex-direction:column; gap:1rem; }

    .venue-section { border:1px solid var(--border); border-radius:8px; overflow:hidden; }
    .venue-header { display:flex; align-items:center; justify-content:space-between; padding:0.65rem 1rem; border-bottom:1px solid var(--border); }
    .venue-header.main-bar { background:rgba(200,245,87,0.05); border-left:3px solid var(--accent); }
    .venue-header.wee-bar  { background:rgba(251,191,36,0.05); border-left:3px solid var(--amber); }
    .venue-header.mandela  { background:rgba(167,139,250,0.05); border-left:3px solid var(--purple); }
    .venue-header.barista  { background:rgba(200,245,87,0.05);  border-left:3px solid var(--accent); }
    .venue-header.popup    { background:rgba(249,115,22,0.05); border-left:3px solid var(--orange); }
    .venue-header.kitchen  { background:rgba(74,222,128,0.05); border-left:3px solid var(--green); }
    .venue-header.management { background:rgba(167,139,250,0.05); border-left:3px solid var(--purple); }
    .venue-name { font-size:0.82rem; font-weight:500; display:flex; align-items:center; gap:0.5rem; }
    .venue-dot { width:7px; height:7px; border-radius:50%; }
    .venue-body { padding:0.75rem 1rem; display:flex; flex-direction:column; gap:0.6rem; }

    .venue-toggle-row { display:flex; gap:0.5rem; flex-wrap:wrap; }
    .venue-toggle { display:inline-flex; align-items:center; gap:0.35rem; font-size:0.78rem; color:var(--muted); cursor:pointer; background:var(--surface2); border:1px dashed var(--border); border-radius:20px; padding:0.3rem 0.85rem; transition:all .15s; font-family:'DM Sans',sans-serif; }
    .venue-toggle:hover { border-color:var(--accent); color:var(--accent); }

    .slot-row { display:grid; grid-template-columns:130px 1fr; gap:0.75rem; align-items:start; padding:0.5rem 0; border-bottom:1px solid var(--border); }
    .slot-row:last-child { border-bottom:none; padding-bottom:0; }
    .slot-name { font-size:0.85rem; font-weight:400; }
    .slot-time { font-size:0.72rem; color:var(--muted); margin-top:0.1rem; }
    .slot-count { display:inline-flex; align-items:center; gap:0.3rem; margin-top:0.35rem; }
    .count-btn { background:none; border:none; color:var(--accent); cursor:pointer; font-size:1rem; line-height:1; padding:0; transition:opacity .15s; font-family:'DM Sans',sans-serif; }
    .count-btn:hover { opacity:0.7; }
    .count-num { font-size:0.78rem; color:var(--accent); font-weight:500; min-width:1rem; text-align:center; }
    .count-label { font-size:0.72rem; color:var(--muted); }
    .slot-content { display:flex; flex-direction:column; gap:0.4rem; }
    .assigned-list { display:flex; flex-wrap:wrap; gap:0.4rem; min-height:28px; }

    .staff-chip { display:flex; align-items:center; gap:0.4rem; border-radius:20px; padding:0.25rem 0.5rem 0.25rem 0.75rem; font-size:0.8rem; border:1px solid var(--border); background:var(--surface2); }
    .chip-area { font-size:0.68rem; font-weight:500; }
    .chip-area.main_bar { color:var(--accent); } .chip-area.wee_bar { color:var(--amber); }
    .chip-area.mandela  { color:var(--purple); } .chip-area.floor   { color:var(--green); }
    .chip-area.management { color:var(--purple); } .chip-area.kitchen { color:var(--green); } .chip-area.popup { color:var(--orange); } .chip-area.barista { color:var(--accent); }
    .chip-remove { background:none; border:none; color:var(--muted); cursor:pointer; font-size:0.9rem; padding:0; line-height:1; transition:color .15s; }
    .chip-remove:hover { color:var(--error); }

    .chip-floor-wrap { display:flex; align-items:center; gap:0.3rem; }
    .chip-floor-label { font-size:0.65rem; color:var(--muted); }
    .floor-switch { position:relative; width:28px; height:16px; flex-shrink:0; }
    .floor-switch input { opacity:0; width:0; height:0; position:absolute; }
    .floor-switch-track { position:absolute; inset:0; background:var(--border); border-radius:20px; cursor:pointer; transition:background .2s; }
    .floor-switch input:checked + .floor-switch-track { background:var(--green); }
    .floor-switch-track::after { content:''; position:absolute; width:10px; height:10px; border-radius:50%; background:#fff; top:3px; left:3px; transition:transform .2s; }
    .floor-switch input:checked + .floor-switch-track::after { transform:translateX(12px); }

    .mgmt-slot-row { display:grid; grid-template-columns:180px 1fr; gap:0.75rem; align-items:start; padding:0.5rem 0; border-bottom:1px solid var(--border); }
    .mgmt-slot-row:last-child { border-bottom:none; padding-bottom:0; }
    .mgmt-time-wrap { display:flex; align-items:center; gap:0.4rem; margin-top:0.3rem; flex-wrap:wrap; }
    .mgmt-time-input { background:var(--surface); border:1px solid var(--border); border-radius:6px; color:var(--accent); font-family:'DM Sans',sans-serif; font-size:0.75rem; padding:0.2rem 0.4rem; outline:none; width:88px; color-scheme:dark; cursor:pointer; }
    .mgmt-time-input:focus { border-color:var(--accent); }
    .mgmt-time-sep { font-size:0.72rem; color:var(--muted); }
    .add-mgmt-slot-btn { display:inline-flex; align-items:center; gap:0.35rem; background:transparent; border:1px dashed var(--border); border-radius:20px; padding:0.25rem 0.75rem; font-size:0.75rem; color:var(--muted); cursor:pointer; transition:all .15s; font-family:'DM Sans',sans-serif; margin-top:0.5rem; }
    .add-mgmt-slot-btn:hover { border-color:var(--purple); color:var(--purple); }
    .remove-mgmt-slot-btn { background:none; border:none; color:var(--muted); cursor:pointer; font-size:0.85rem; padding:0.1rem 0.3rem; transition:color .15s; line-height:1; }
    .remove-mgmt-slot-btn:hover { color:var(--error); }

    .urgent-banner { display:flex; align-items:center; gap:0.75rem; background:rgba(255,107,107,0.08); border:1px solid rgba(255,107,107,0.25); border-radius:8px; padding:0.6rem 1rem; margin-top:0.5rem; }
    .urgent-dot { width:8px; height:8px; border-radius:50%; background:var(--error); animation:pulse 1.5s infinite; flex-shrink:0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .urgent-label { font-size:0.78rem; color:var(--error); flex:1; }
    .btn-urgent { font-size:0.75rem; padding:0.3rem 0.85rem; border-radius:6px; background:rgba(255,107,107,0.15); border:1px solid rgba(255,107,107,0.4); color:var(--error); cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .15s; white-space:nowrap; }
    .btn-urgent:hover { background:rgba(255,107,107,0.25); }

    .add-staff-btn { display:inline-flex; align-items:center; gap:0.4rem; background:transparent; border:1px dashed var(--border); border-radius:20px; padding:0.25rem 0.75rem; font-size:0.78rem; color:var(--muted); cursor:pointer; transition:all .15s; font-family:'DM Sans',sans-serif; }
    .add-staff-btn:hover { border-color:var(--accent); color:var(--accent); }

    .event-config { display:flex; align-items:center; gap:0.75rem; flex-wrap:wrap; padding:0.5rem 0; border-bottom:1px solid var(--border); }
    .event-config label { font-size:0.72rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; }
    .event-config input[type="time"] { background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--accent); font-family:'DM Sans',sans-serif; font-size:0.82rem; padding:0.3rem 0.6rem; outline:none; width:110px; cursor:pointer; color-scheme:dark; }
    .event-config input[type="time"]:focus { border-color:var(--accent); box-shadow:0 0 0 2px rgba(200,245,87,0.1); }
    .event-config input[type="text"] { background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.82rem; padding:0.3rem 0.6rem; outline:none; width:140px; }
    .event-config input[type="text"]:focus { border-color:var(--accent); }
    .save-event-btn { font-size:0.75rem; padding:0.3rem 0.75rem; border-radius:6px; background:rgba(200,245,87,0.1); border:1px solid rgba(200,245,87,0.3); color:var(--accent); cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .15s; }
    .save-event-btn:hover { background:rgba(200,245,87,0.2); }
    .remove-event-btn { font-size:0.75rem; padding:0.3rem 0.75rem; border-radius:6px; background:transparent; border:1px solid var(--border); color:var(--muted); cursor:pointer; font-family:'DM Sans',sans-serif; transition:all .15s; }
    .remove-event-btn:hover { border-color:var(--error); color:var(--error); }

    .picker-overlay { position:fixed; inset:0; z-index:50; display:none; }
    .picker-overlay.open { display:block; }
    .picker { position:fixed; z-index:51; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); width:320px; max-height:500px; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 8px 32px rgba(0,0,0,0.4); }
    .picker-header { padding:0.85rem 1rem; border-bottom:1px solid var(--border); }
    .picker-title { font-size:0.85rem; font-weight:500; }
    .picker-subtitle { font-size:0.72rem; color:var(--muted); margin-top:0.2rem; }
    .picker-search { padding:0.6rem 1rem; border-bottom:1px solid var(--border); }
    .picker-search input { width:100%; background:var(--surface2); border:1px solid var(--border); border-radius:6px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.85rem; padding:0.4rem 0.75rem; outline:none; }
    .picker-search input:focus { border-color:var(--accent); }
    .picker-list { overflow-y:auto; flex:1; }
    .picker-item { display:flex; align-items:center; justify-content:space-between; padding:0.65rem 1rem; cursor:pointer; border-bottom:1px solid var(--border); transition:background .1s; }
    .picker-item:hover { background:var(--surface2); }
    .picker-item.preferred { background:rgba(200,245,87,0.04); }
    .picker-item.blocked { opacity:0.4; cursor:not-allowed; }
    .picker-name { font-size:0.88rem; }
    .picker-avail { font-size:0.72rem; }
    .avail-preferred { color:var(--accent); } .avail-available { color:var(--green); }
    .avail-unavailable { color:var(--error); } .avail-none { color:var(--muted); }
    .picker-empty { padding:1.5rem; text-align:center; color:var(--muted); font-size:0.85rem; }

    .publish-bar { position:fixed; bottom:0; left:var(--nav-w); right:0; background:var(--surface); border-top:1px solid var(--border); padding:1rem 2.5rem; display:flex; align-items:center; justify-content:space-between; z-index:20; }
    .publish-bar-left { display:flex; flex-direction:column; gap:0.2rem; }
    .publish-bar-label { font-size:0.78rem; color:var(--muted); text-transform:uppercase; letter-spacing:0.06em; }
    .publish-bar-week  { font-size:0.95rem; }
    .publish-bar-actions { display:flex; gap:0.75rem; }

    .toast { position:fixed; bottom:5rem; left:50%; transform:translateX(-50%) translateY(20px); background:var(--green); color:#0d0d0d; padding:0.65rem 1.5rem; border-radius:8px; font-size:0.88rem; font-weight:500; opacity:0; transition:all .3s ease; pointer-events:none; z-index:100; }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    .toast.error { background:var(--error); color:#fff; }
    .no-weeks { text-align:center; padding:4rem 2rem; color:var(--muted); }
    .no-weeks .big { font-family:'DM Serif Display',serif; font-size:3rem; margin-bottom:0.5rem; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @media (max-width:900px) { .nav { display:none; } .main { margin-left:0; padding:1.5rem 1rem 8rem; } .publish-bar { left:0; } .slot-row { grid-template-columns:1fr; } .main.panel-open { padding-right:1rem; } }

    .hamburger { display:none; position:fixed; top:1rem; left:1rem; z-index:100; background:var(--surface); border:1px solid var(--border); border-radius:8px; width:40px; height:40px; align-items:center; justify-content:center; cursor:pointer; flex-direction:column; gap:5px; padding:10px; }
    .hamburger span { display:block; width:18px; height:2px; background:var(--text); border-radius:2px; transition:all .2s; }
    .nav-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.5); z-index:9; }
    @media (max-width:900px) {
      .hamburger { display:flex; }
      .nav { transform:translateX(-100%); transition:transform .25s ease; }
      .nav.open { transform:translateX(0); }
      .nav-overlay.open { display:block; }
    }

    /* ── Fairness panel ── */
    .fairness-panel {
      position: fixed;
      top: 0; right: 0; bottom: 0;
      width: 300px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      z-index: 30;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.25s ease;
    }
    .fairness-panel.open { transform: translateX(0); }
    .fairness-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 1rem;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .fairness-panel-title { font-size: 0.82rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.07em; color: var(--muted); }
    .fairness-panel-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.1rem; padding: 0; line-height: 1; transition: color .15s; }
    .fairness-panel-close:hover { color: var(--text); }
    .fairness-panel-list { overflow-y: auto; flex: 1; padding: 0.5rem 0; }
    .fairness-row {
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      gap: 0.5rem;
      padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--border);
    }

<script src="env.js"></script>
<script type="module">
import { supabase, requireManager } from './src/lib/supabase.js'

let currentUser  = null
let weeks        = []
let selectedWeek = null
let templates    = []
let allStaff     = []
let availability = {}
let rotaShifts   = {}
let dayConfigs   = {}
let pickerCtx           = null
let availabilityMeta    = {}
let availabilityFirstSubmit = {}
const todayStr   = new Date().toISOString().split('T')[0]

const VENUES = [
  { key:'main_bar', label:'Main Bar',  colorClass:'main-bar', dot:'var(--accent)',  area:'main_bar', adhoc:false },
  { key:'wee_bar',  label:'Wee Bar',   colorClass:'wee-bar',  dot:'var(--amber)',   area:'wee_bar',  adhoc:true  },
  { key:'mandela',  label:'Mandela',   colorClass:'mandela',  dot:'var(--purple)',  area:'mandela',  adhoc:true  },
  { key:'popup',    label:'Pop-up Bar',colorClass:'popup',    dot:'var(--orange)',  area:'popup',    adhoc:true  },
  { key:'kitchen',  label:'Kitchen',   colorClass:'kitchen',  dot:'var(--green)',   area:'kitchen',  adhoc:false },
]

currentUser = await requireManager()
if (!currentUser) throw new Error('Not a manager')
const initials = currentUser.name.split(' ').map(n=>n[0]).join('').toUpperCase().slice(0,2)
document.getElementById('nav-avatar').textContent = initials
document.getElementById('nav-name').textContent   = currentUser.name
document.getElementById('nav-role').textContent   = currentUser.role
window.handleSignOut = async () => { await supabase.auth.signOut(); window.location.href='/login.html' }

const { data:tplData } = await supabase.from('shift_templates').select('*,roles(*)').order('start_time')
templates = tplData ?? []

const { data:staffData } = await supabase.from('users').select('*,user_roles(*,roles(*))').eq('active',true).order('name')
allStaff = staffData ?? []

let termTime = true
const { data: termData } = await supabase.from('bar_settings').select('value').eq('key','term_time').maybeSingle()
if (termData) termTime = termData.value === 'true'

function getWeeklyHours(userId) {
  let totalMins = 0
  Object.entries(rotaShifts).forEach(([key, shifts]) => {
    const shiftDate = key.slice(-10)
    if (!shiftDate || shiftDate < selectedWeek.start_date || shiftDate > selectedWeek.end_date) return
    shifts.forEach(rs => {
      if (rs.user_id !== userId || rs.status === 'cancelled') return
      const dc    = dayConfigs[key]
      const tplId = key.slice(0, key.length - 11)
      const tpl   = templates.find(t => t.id === tplId)
      const start = (dc?.start_time ?? tpl?.start_time ?? '00:00').slice(0,5)
      const end   = (dc?.end_time   ?? tpl?.end_time   ?? '00:00').slice(0,5)
      const [sh,sm] = start.split(':').map(Number)
      const [eh,em] = end.split(':').map(Number)
      let mins = (eh*60+em) - (sh*60+sm)
      if (mins < 0) mins += 1440
      totalMins += mins
    })
  })
  return totalMins / 60
}

window.loadWeek = async (weekId) => {
  selectedWeek = weeks.find(w => w.id === weekId)
  if (!selectedWeek) return

  const statusEl = document.getElementById('week-status')
  statusEl.className   = `week-status status-${selectedWeek.status}`
  statusEl.textContent = selectedWeek.status.charAt(0).toUpperCase() + selectedWeek.status.slice(1)

  const fmt = d => new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'long'})
  const rangeStr = `${fmt(selectedWeek.start_date)} – ${fmt(selectedWeek.end_date)}`
  document.getElementById('week-range').textContent       = rangeStr
  document.getElementById('publish-bar-week').textContent = rangeStr

  const publishBtn = document.getElementById('btn-publish')
  publishBtn.textContent = selectedWeek.status === 'published' ? 'Republish' : 'Publish rota'

  const { data:avData } = await supabase.from('availability').select('*').eq('fortnight_id', weekId)
  availability = {}
  availabilityMeta = {}
  availabilityFirstSubmit = {}
  ;(avData ?? []).forEach(a => {
    const key = a.user_id + '_' + a.shift_template_id + '_' + a.shift_date
    availability[key] = a.status
    const dateKey = a.user_id + '_' + a.shift_date
    if (!availabilityFirstSubmit[dateKey] || a.submitted_at < availabilityFirstSubmit[dateKey]) {
      availabilityFirstSubmit[dateKey] = a.submitted_at
    }
  })

  const { data:rsData } = await supabase.from('rota_shifts').select('*').eq('fortnight_id', weekId)
  rotaShifts = {}
  ;(rsData ?? []).forEach(rs => {
    const key = `${rs.shift_template_id}_${rs.shift_date}`
    if (!rotaShifts[key]) rotaShifts[key] = []
    rotaShifts[key].push({ id:rs.id, user_id:rs.user_id, venue_area:rs.venue_area, status:rs.status })
  })

  const { data:dcData } = await supabase.from('shift_day_config').select('*').eq('fortnight_id', weekId)
  dayConfigs = {}
  ;(dcData ?? []).forEach(dc => {
    let configKey
    if (dc.notes && dc.notes.startsWith('venue:')) {
      configKey = dc.notes.replace('venue:', '') + '_' + dc.shift_date
    } else if (!dc.shift_template_id) {
      configKey = 'popup_' + dc.shift_date
    } else {
      configKey = dc.shift_template_id + '_' + dc.shift_date
    }
    dayConfigs[configKey] = { id: dc.id, required_staff: dc.required_staff, start_time: dc.start_time, end_time: dc.end_time, notes: dc.notes }
  })

  renderGrid()
  // CHANGE 6: re-render fairness panel on week load
  if (document.getElementById('fairness-panel').classList.contains('open')) renderFairnessPanel()
}

window.loadWeek = window.loadWeek

await loadWeeks()
async function loadWeeks() {
  const { data } = await supabase.from('fortnights').select('*').order('start_date',{ascending:true})
  weeks = data ?? []
  const sel = document.getElementById('week-select')
  sel.innerHTML = ''
  if (weeks.length === 0) {
    document.getElementById('rota-grid').innerHTML = '<div class="no-weeks"><div class="big">📋</div><p>No weeks yet. Create one to get started.</p></div>'
    document.getElementById('publish-bar').style.display = 'none'
    return
  }
  weeks.forEach(w => {
    const fmt = d => new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'})
    const opt = document.createElement('option')
    opt.value = w.id
    opt.textContent = `w/c ${fmt(w.start_date)} – ${fmt(w.end_date)}`
    sel.appendChild(opt)
  })
  await window.loadWeek(weeks[0].id)
}

function renderGrid() {
  const container = document.getElementById('rota-grid')
  container.innerHTML = ''
  const [sy,sm,sd] = selectedWeek.start_date.split('-').map(Number)
  const start = new Date(sy, sm-1, sd)
  const dates = Array.from({length:7},(_,i) => { const d=new Date(start); d.setDate(start.getDate()+i); return d })

  dates.forEach(date => {
    const dateStr  = date.toISOString().split('T')[0]
    const dayName  = date.toLocaleDateString('en-GB',{weekday:'long'})
    const dayShort = date.toLocaleDateString('en-GB',{day:'numeric',month:'short'})
    const isToday  = dateStr === todayStr

    let assigned=0, needed=0
    templates.forEach(t => {
      const key = `${t.id}_${dateStr}`
      const dc  = dayConfigs[key]
      if (t.is_adhoc && !dc) return
      assigned += (rotaShifts[key]??[]).filter(s=>s.status!=='cancelled').length
      needed   += dc?.required_staff ?? t.min_staff
    })
    for (const vk of ['popup', 'kitchen', 'mandela', 'barista', 'wee_bar']) {
      const vKey = `${vk}_${dateStr}`
      if (dayConfigs[vKey]) {
        assigned += (rotaShifts[vKey]??[]).filter(s=>s.status!=='cancelled').length
        needed   += dayConfigs[vKey].required_staff ?? 1
      }
    }

    const dotColor = assigned>=needed ? 'dot-green' : assigned>0 ? 'dot-amber' : 'dot-red'

    const panel = document.createElement('div')
    panel.className = 'day-panel'
    panel.innerHTML = `
      <div class="day-header" onclick="toggleDay('body-${dateStr}')">
        <div class="day-header-left">
          <span class="day-name-big">${dayName}</span>
          <span class="day-date-small">${dayShort}</span>
          ${isToday?'<span class="day-today-badge">Today</span>':''}
        </div>
        <div class="day-coverage">
          <div class="coverage-dot ${dotColor}"></div>
          <span class="coverage-text">${assigned}/${needed} filled</span>
          <span style="color:var(--muted);font-size:0.85rem;margin-left:0.25rem">▾</span>
        </div>
      </div>
      <div class="day-body" id="body-${dateStr}" style="${isToday ? '' : 'display:none'}"></div>`

    const body = panel.querySelector(`#body-${dateStr}`)
    renderManagementSection(body, dateStr)
    renderMainBarSection(body, dateStr)
    renderEventVenueSection(body, dateStr, 'barista',  'barista',  'Barista',        'var(--accent)')
    renderEventVenueSection(body, dateStr, 'wee_bar',  'wee-bar',  'Wee Bar',        'var(--amber)')
    renderEventVenueSection(body, dateStr, 'mandela',  'mandela',  'Mandela',        'var(--purple)')
    renderEventVenueSection(body, dateStr, 'popup',    'popup',    'Pop-up Bar',     'var(--orange)')
    renderEventVenueSection(body, dateStr, 'kitchen',  'kitchen',  'Kitchen Porter', 'var(--green)')
    container.appendChild(panel)
  })
}

function renderManagementSection(body, dateStr) {
  const mgmtTpls = templates.filter(t => t.roles?.name === 'manager' && !t.is_adhoc)
  if (mgmtTpls.length === 0) return

  const extraSlots = Object.entries(dayConfigs)
    .filter(([k]) => k.startsWith('mgmt_') && k.endsWith('_' + dateStr))
    .map(([k, dc]) => ({ key: k, dc }))

  const section = document.createElement('div')
  section.className = 'venue-section'
  section.id = 'mgmt-section-' + dateStr
  section.innerHTML = `
    <div class="venue-header management">
      <div class="venue-name"><div class="venue-dot" style="background:var(--purple)"></div>Management</div>
    </div>
    <div class="venue-body" id="mgmt-body-${dateStr}"></div>`

  const vBody = section.querySelector('#mgmt-body-' + dateStr)

  mgmtTpls.forEach(tpl => {
    const key      = tpl.id + '_' + dateStr
    const dc       = dayConfigs[key]
    const required = dc?.required_staff ?? tpl.min_staff
    const assigned = (rotaShifts[key] ?? []).filter(s => s.status !== 'cancelled')
    const startVal = dc?.start_time ?? tpl.start_time
    const endVal   = dc?.end_time   ?? tpl.end_time
    vBody.appendChild(buildMgmtSlotRow(tpl.id, startVal, endVal, dateStr, key, required, assigned, false))
  })

  extraSlots.forEach(({ key, dc }) => {
    const assigned = (rotaShifts[key] ?? []).filter(s => s.status !== 'cancelled')
    vBody.appendChild(buildMgmtSlotRow(key, dc.start_time, dc.end_time, dateStr, key, dc.required_staff ?? 1, assigned, true))
  })

  const addBtn = document.createElement('button')
  addBtn.className = 'add-mgmt-slot-btn'
  addBtn.textContent = '+ Add management slot'
  addBtn.onclick = () => addMgmtSlot(dateStr)
  vBody.appendChild(addBtn)

  body.appendChild(section)
}

function buildMgmtSlotRow(templateId, startTime, endTime, dateStr, key, required, assigned, isExtra) {
  const startDisp = (startTime || '').slice(0, 5) || '00:00'
  const endDisp   = (endTime   || '').slice(0, 5) || '00:00'

  const row = document.createElement('div')
  row.className = 'mgmt-slot-row'
  row.id = 'slot-' + key

  row.innerHTML = `
    <div class="slot-label">
      <div class="mgmt-time-wrap">
        <input type="time" class="mgmt-time-input" id="mgmt-start-${key}" value="${startDisp}"
          onchange="saveMgmtTime('${templateId}','${dateStr}','${key}')" />
        <span class="mgmt-time-sep">–</span>
        <input type="time" class="mgmt-time-input" id="mgmt-end-${key}" value="${endDisp}"
          onchange="saveMgmtTime('${templateId}','${dateStr}','${key}')" />
        ${isExtra ? `<button class="remove-mgmt-slot-btn" onclick="removeMgmtSlot('${key}','${dateStr}')" title="Remove slot">×</button>` : ''}
      </div>
      <div class="slot-count" style="margin-top:0.3rem">
        <button class="count-btn" onclick="updateRequired('${templateId}','${dateStr}',-1)">−</button>
        <span class="count-num" id="req-${key}">${required}</span>
        <button class="count-btn" onclick="updateRequired('${templateId}','${dateStr}',1)">+</button>
        <span class="count-label">needed</span>
      </div>
    </div>
    <div class="slot-content">
      <div class="assigned-list" id="assigned-${key}"></div>
      <button class="add-staff-btn" onclick="openPicker('${templateId}','${dateStr}','management',this)">+ Add manager</button>
    </div>`

  const list = row.querySelector('#assigned-' + key)
  assigned.forEach(rs => {
    const s = allStaff.find(x => x.id === rs.user_id)
    if (s) list.appendChild(buildChip(rs, s, templateId, dateStr))
  })

  return row
}

window.addMgmtSlot = async (dateStr) => {
  const slotIndex = Object.keys(dayConfigs).filter(k => k.startsWith('mgmt_') && k.endsWith('_' + dateStr)).length + 1
  const key = 'mgmt_' + slotIndex + '_' + dateStr

  const { data, error } = await supabase.from('shift_day_config').insert({
    fortnight_id:      selectedWeek.id,
    shift_template_id: null,
    shift_date:        dateStr,
    required_staff:    1,
    start_time:        '18:00:00',
    end_time:          '02:00:00',
    notes:             'venue:' + key.replace('_' + dateStr, ''),
  }).select().single()

  if (!error && data) {
    dayConfigs[key] = { id: data.id, required_staff: 1, start_time: '18:00:00', end_time: '02:00:00', notes: data.notes }
  }
  rerenderDay(dateStr)
}

window.removeMgmtSlot = async (key, dateStr) => {
  const dc = dayConfigs[key]
  if (dc) {
    await supabase.from('shift_day_config').delete().eq('id', dc.id)
    for (const rs of (rotaShifts[key] ?? [])) await supabase.from('rota_shifts').delete().eq('id', rs.id)
    delete dayConfigs[key]
    delete rotaShifts[key]
  }
  rerenderDay(dateStr)
}

window.saveMgmtTime = async (templateId, dateStr, key) => {
  const startEl = document.getElementById('mgmt-start-' + key)
  const endEl   = document.getElementById('mgmt-end-'   + key)
  if (!startEl || !endEl) return

  const startTime = startEl.value + ':00'
  const endTime   = endEl.value   + ':00'

  const dc = dayConfigs[key]
  if (dc) {
    await supabase.from('shift_day_config').update({ start_time: startTime, end_time: endTime }).eq('id', dc.id)
    dayConfigs[key].start_time = startTime
    dayConfigs[key].end_time   = endTime
  } else {
    const tpl = templates.find(t => t.id === templateId)
    const { data } = await supabase.from('shift_day_config').insert({
      fortnight_id:      selectedWeek.id,
      shift_template_id: templateId,
      shift_date:        dateStr,
      required_staff:    tpl?.min_staff ?? 1,
      start_time:        startTime,
      end_time:          endTime,
    }).select().single()
    if (data) dayConfigs[key] = { id: data.id, required_staff: data.required_staff, start_time: startTime, end_time: endTime }
  }
}

function renderMainBarSection(body, dateStr) {
  const mainBarTpls = templates.filter(t => !t.is_adhoc && t.roles?.name === 'bar')
  if (mainBarTpls.length === 0) return

  const section = document.createElement('div')
  section.className = 'venue-section'
  section.innerHTML = `
    <div class="venue-header main-bar">
      <div class="venue-name"><div class="venue-dot" style="background:var(--accent)"></div>Main Bar</div>
    </div>
    <div class="venue-body" id="main-bar-body-${dateStr}"></div>`
  const vBody = section.querySelector(`#main-bar-body-${dateStr}`)

  mainBarTpls.forEach(tpl => {
    const key      = `${tpl.id}_${dateStr}`
    const dc       = dayConfigs[key]
    const required = dc?.required_staff ?? tpl.min_staff
    const assigned = (rotaShifts[key]??[]).filter(s=>s.status!=='cancelled')
    vBody.appendChild(buildSlotRow(tpl.id, tpl.name, tpl.start_time, tpl.end_time, dateStr, key, required, assigned, 'main_bar', false))
  })

  body.appendChild(section)
}

function renderEventVenueSection(body, dateStr, venueKey, colorClass, label, dotColor) {
  const primaryKey = venueKey + '_' + dateStr
  const primaryDc  = dayConfigs[primaryKey]
  const active     = !!primaryDc

  const indexedSlots = Object.entries(dayConfigs).filter(([k]) => {
    if (!k.endsWith('_' + dateStr)) return false
    const withoutDate = k.slice(0, k.length - dateStr.length - 1)
    if (!withoutDate.startsWith(venueKey + '_')) return false
    const suffix = withoutDate.slice(venueKey.length + 1)
    return /^[0-9]+$/.test(suffix)
  }).map(([k, dc]) => ({ key: k, dc }))

  const section = document.createElement('div')
  section.className = 'venue-section'
  section.id = 'venue-section-' + venueKey + '-' + dateStr

  section.innerHTML =
    '<div class="venue-header ' + colorClass + '">' +
      '<div class="venue-name"><div class="venue-dot" style="background:' + dotColor + '"></div>' + label + '</div>' +
      '<div style="display:flex;gap:0.5rem;align-items:center">' +
        (active
          ? '<button class="remove-event-btn" onclick="toggleEventVenue(\'' + venueKey + '\',\'' + dateStr + '\',false)">Remove all</button>'
          : '<button class="venue-toggle" onclick="toggleEventVenue(\'' + venueKey + '\',\'' + dateStr + '\',true)">+ Add to rota</button>'
        ) +
      '</div></div>'

  if (active) {
    const vBody = document.createElement('div')
    vBody.className = 'venue-body'
    renderEventSlot(vBody, primaryKey, primaryDc, venueKey, label, dateStr, false)
    indexedSlots.forEach(({ key, dc }) => renderEventSlot(vBody, key, dc, venueKey, label, dateStr, true))
    const addBtn = document.createElement('button')
    addBtn.className = 'add-mgmt-slot-btn'
    addBtn.textContent = '+ Add another ' + label + ' slot'
    addBtn.onclick = () => addEventSlot(venueKey, dateStr, label)
    vBody.appendChild(addBtn)
    section.appendChild(vBody)
  }

  body.appendChild(section)
}

function renderEventSlot(vBody, configKey, dc, venueKey, label, dateStr, isExtra) {
  const isPopup      = venueKey === 'popup'
  const displayNotes = dc.notes && dc.notes.startsWith('venue:') ? '' : (dc.notes || '')
  const startVal     = dc.start_time ? dc.start_time.slice(0,5) : '18:00'
  const endVal       = dc.end_time   ? dc.end_time.slice(0,5)   : '23:00'

  const wrapper = document.createElement('div')
  if (isExtra) wrapper.style.cssText = 'border-top:1px solid var(--border);padding-top:0.5rem;margin-top:0.25rem'

  const configRow = document.createElement('div')
  configRow.className = 'event-config'
  configRow.innerHTML =
    '<label>Start</label>' +
    '<input type="time" id="start-' + configKey + '" value="' + startVal + '" onchange="saveEventConfig(\'' + venueKey + '\',\'' + dateStr + '\',\'' + configKey + '\')" />' +
    '<label>End</label>' +
    '<input type="time" id="end-' + configKey + '" value="' + endVal + '" onchange="saveEventConfig(\'' + venueKey + '\',\'' + dateStr + '\',\'' + configKey + '\')" />' +
    (isPopup ? '<label>Name</label><input type="text" id="name-' + configKey + '" value="' + (displayNotes||'Pop-up Bar') + '" placeholder="e.g. Freshers Bar" onchange="saveEventConfig(\'' + venueKey + '\',\'' + dateStr + '\',\'' + configKey + '\')" />' : '') +
    (isExtra ? '<button class="remove-mgmt-slot-btn" onclick="removeEventSlot(\'' + configKey + '\',\'' + dateStr + '\',\'' + venueKey + '\')" title="Remove">×</button>' : '')

  wrapper.appendChild(configRow)

  const assigned = (rotaShifts[configKey]||[]).filter(s => s.status !== 'cancelled')
  const required = dc.required_staff || 1
  const slotName = isPopup ? (displayNotes||'Pop-up Bar') : label
  wrapper.appendChild(buildSlotRow(configKey, slotName, startVal, endVal, dateStr, configKey, required, assigned, venueKey, true))
  vBody.appendChild(wrapper)
}

window.addEventSlot = async (venueKey, dateStr) => {
  let idx = 1
  while (dayConfigs[venueKey + '_' + idx + '_' + dateStr]) idx++
  const key = venueKey + '_' + idx + '_' + dateStr
  const { data, error } = await supabase.from('shift_day_config').insert({
    fortnight_id: selectedWeek.id, shift_template_id: null,
    shift_date: dateStr, required_staff: 1,
    start_time: '20:00:00', end_time: '02:00:00',
    notes: 'venue:' + venueKey + '_' + idx,
  }).select().single()
  if (!error && data) dayConfigs[key] = { id: data.id, required_staff: 1, start_time: '20:00:00', end_time: '02:00:00', notes: data.notes }
  rerenderDay(dateStr)
}

window.removeEventSlot = async (key, dateStr, venueKey) => {
  const dc = dayConfigs[key]
  if (dc) {
    await supabase.from('shift_day_config').delete().eq('id', dc.id)
    for (const rs of (rotaShifts[key]??[])) await supabase.from('rota_shifts').delete().eq('id', rs.id)
    delete dayConfigs[key]
    delete rotaShifts[key]
  }
  rerenderDay(dateStr)
}

function buildSlotRow(templateId, name, startTime, endTime, dateStr, key, required, assigned, defaultArea, isEvent) {
  const row = document.createElement('div')
  row.className = 'slot-row'
  row.id = `slot-${key}`

  const startDisp = typeof startTime === 'string' ? startTime.slice(0,5) : '--:--'
  const endDisp   = typeof endTime   === 'string' ? endTime.slice(0,5)   : '--:--'

  row.innerHTML = `
    <div class="slot-label">
      <div class="slot-name">${name}</div>
      <div class="slot-time">${startDisp} – ${endDisp}</div>
      <div class="slot-count">
        <button class="count-btn" onclick="updateRequired('${templateId}','${dateStr}',-1)">−</button>
        <span class="count-num" id="req-${key}">${required}</span>
        <button class="count-btn" onclick="updateRequired('${templateId}','${dateStr}',1)">+</button>
        <span class="count-label">needed</span>
      </div>
    </div>
    <div class="slot-content">
      <div class="assigned-list" id="assigned-${key}"></div>
      <button class="add-staff-btn" onclick="openPicker('${templateId}','${dateStr}','${defaultArea}',this)">+ Add staff</button>
    </div>`

  const list = row.querySelector(`#assigned-${key}`)
  assigned.forEach(rs => {
    const s = allStaff.find(x => x.id === rs.user_id)
    if (s) list.appendChild(buildChip(rs, s, templateId, dateStr))
  })

  return row
}

window.toggleFloor = async (shiftId, templateId, dateStr, isChecked) => {
  const newArea = isChecked ? 'floor' : 'main_bar'
  const { error } = await supabase.from('rota_shifts').update({ venue_area: newArea }).eq('id', shiftId)
  if (error) { showToast('Error updating', true); return }

  const configKey = templateId + '_' + dateStr
  if (rotaShifts[configKey]) {
    const rs = rotaShifts[configKey].find(r => r.id === shiftId)
    if (rs) rs.venue_area = newArea
  }
}

function buildChip(rs, staffMember, templateId, dateStr) {
  const areaLabels = { main_bar:'Bar', wee_bar:'Wee Bar', mandela:'Mandela', floor:'Floor', kitchen:'Kitchen Porter', popup:'Pop-up', barista:'Barista', management:'Manager' }
  const isMainBar = rs.venue_area === 'main_bar' || rs.venue_area === 'floor'
  const isFloor   = rs.venue_area === 'floor'
  const chip = document.createElement('div')
  chip.className = 'staff-chip'
  chip.id = `chip-${rs.id}`
  chip.innerHTML = `
    <span>${staffMember.name.split(' ')[0]}</span>
    ${isMainBar ? `
      <div class="chip-floor-wrap">
        <span class="chip-floor-label">Floor</span>
        <label class="floor-switch" title="Toggle Floor">
          <input type="checkbox" ${isFloor ? 'checked' : ''}
            onchange="toggleFloor('${rs.id}','${templateId}','${dateStr}',this.checked)" />
          <div class="floor-switch-track"></div>
        </label>
      </div>`
      : `<span class="chip-area ${rs.venue_area}">${areaLabels[rs.venue_area]??rs.venue_area}</span>`
    }
    <button class="chip-remove" onclick="removeShift('${rs.id}','${templateId}','${dateStr}')">×</button>`
  return chip
}

window.toggleEventVenue = async (venueKey, dateStr, enable) => {
  const key = `${venueKey}_${dateStr}`
  const tpl = venueKey === 'kitchen'
    ? templates.find(t => t.roles?.name === 'kp')
    : venueKey === 'barista'
    ? templates.find(t => t.name === 'Barista')
    : templates.find(t => t.is_adhoc && t.venue_area === venueKey)

  if (enable) {
    const defaultStart = tpl?.start_time ?? '18:00:00'
    const defaultEnd   = tpl?.end_time   ?? '23:00:00'
    const { data, error } = await supabase.from('shift_day_config').insert({
      fortnight_id:      selectedWeek.id,
      shift_template_id: null,
      shift_date:        dateStr,
      required_staff:    tpl?.min_staff ?? 2,
      start_time:        defaultStart,
      end_time:          defaultEnd,
      notes:             'venue:' + venueKey,
    }).select().single()
    if (!error && data) dayConfigs[key] = { id:data.id, required_staff:data.required_staff, start_time:data.start_time, end_time:data.end_time, notes:data.notes }
  } else {
    const keysToRemove = Object.keys(dayConfigs).filter(k => {
      if (k === venueKey + '_' + dateStr) return true
      const withoutDate = k.slice(0, k.length - dateStr.length - 1)
      const withoutVenue = withoutDate.slice(venueKey.length + 1)
      return withoutDate.startsWith(venueKey + '_') && /^\d+$/.test(withoutVenue) && k.endsWith('_' + dateStr)
    })
    for (const k of keysToRemove) {
      const dc = dayConfigs[k]
      if (dc) {
        await supabase.from('shift_day_config').delete().eq('id', dc.id)
        for (const rs of (rotaShifts[k]??[])) await supabase.from('rota_shifts').delete().eq('id', rs.id)
        delete dayConfigs[k]
        delete rotaShifts[k]
      }
    }
  }
  rerenderDay(dateStr)
}

function rerenderDay(dateStr) {
  const body = document.getElementById('body-' + dateStr)
  if (!body) return
  body.innerHTML = ''
  renderManagementSection(body, dateStr)
  renderMainBarSection(body, dateStr)
  renderEventVenueSection(body, dateStr, 'barista',  'barista',  'Barista',        'var(--accent)')
  renderEventVenueSection(body, dateStr, 'wee_bar',  'wee-bar',  'Wee Bar',        'var(--amber)')
  renderEventVenueSection(body, dateStr, 'mandela',  'mandela',  'Mandela',        'var(--purple)')
  renderEventVenueSection(body, dateStr, 'popup',    'popup',    'Pop-up Bar',     'var(--orange)')
  renderEventVenueSection(body, dateStr, 'kitchen',  'kitchen',  'Kitchen Porter', 'var(--green)')
  updateDayCoverage(dateStr)
}

window.saveEventConfig = async (venueKey, dateStr, configKey) => {
  const key = configKey || (venueKey + '_' + dateStr)
  const dc  = dayConfigs[key]
  if (!dc) return

  const startEl = document.getElementById('start-' + key)
  const endEl   = document.getElementById('end-'   + key)
  const nameEl  = document.getElementById('name-'  + key)

  const updates = {
    start_time: startEl?.value ? startEl.value + ':00' : dc.start_time,
    end_time:   endEl?.value   ? endEl.value   + ':00' : dc.end_time,
    notes: nameEl ? (nameEl.value || dc.notes) : dc.notes,

window.updateRequired = async (templateId, dateStr, delta) => {
  const key     = `${templateId}_${dateStr}`
  const dc      = dayConfigs[key]
  const tpl     = templates.find(t => t.id === templateId)
  const current = dc?.required_staff ?? tpl?.min_staff ?? 1
  const newCount = Math.max(1, current + delta)

  if (dc) {
    await supabase.from('shift_day_config').update({ required_staff:newCount }).eq('id', dc.id)
    dayConfigs[key].required_staff = newCount
  } else {
    const { data } = await supabase.from('shift_day_config').insert({
      fortnight_id:selectedWeek.id, shift_template_id:templateId==='popup'?null:templateId,
      shift_date:dateStr, required_staff:newCount,
      start_time:tpl?.start_time??'18:00', end_time:tpl?.end_time??'23:00',
    }).select().single()
    if (data) dayConfigs[key] = { id:data.id, required_staff:newCount }
  }

  const numEl = document.getElementById(`req-${key}`)
  if (numEl) numEl.textContent = newCount
  updateDayCoverage(dateStr)
}

window.openPicker = (templateId, dateStr, defaultArea, btn) => {

  const dc        = dayConfigs[configKey]
  const tpl       = templates.find(t => t.id === templateId)

  picker.style.left = `${Math.min(rect.left, window.innerWidth-340)}px`

function timeToMins(t) {
  const [h,m] = (t||'00:00').slice(0,5).split(':').map(Number)
  return h*60+m
}

function timesOverlap(aStart, aEnd, bStart, bEnd) {
  let as=timeToMins(aStart), ae=timeToMins(aEnd), bs=timeToMins(bStart), be=timeToMins(bEnd)
  if (ae<=as) ae+=1440
  if (be<=bs) be+=1440
  return as<be && bs<ae
}

function buildPickerList(alreadyAssigned, search) {
  const list = document.getElementById('picker-list')
  list.innerHTML = ''
  const { templateId, dateStr, defaultArea, effectiveStart, effectiveEnd } = pickerCtx

  const isKitchen    = defaultArea === 'kitchen' || pickerCtx.templateId === 'kitchen'
  const isManagement = defaultArea === 'management'
  const eligible  = allStaff.filter(s => {
    const roleMatch = isManagement
      ? (s.role === 'manager' || s.role === 'admin')
      : isKitchen
      ? s.user_roles?.some(ur => ur.roles?.name === 'kp' || ur.roles?.name === 'bar')
      : s.user_roles?.some(ur => ur.roles?.name === 'bar')
    return roleMatch && s.name.toLowerCase().includes(search.toLowerCase())
  })

  if (eligible.length === 0) { list.innerHTML='<div class="picker-empty">No matching staff found</div>'; return }

  const isVenueKeyed = ['popup','kitchen','mandela','barista','wee_bar'].includes(templateId)

  function getAvailabilityForUser(userId) {
    const direct = availability[userId + '_' + templateId + '_' + dateStr]
    if (direct) return direct

    if (isVenueKeyed) {
      const dc = dayConfigs[templateId + '_' + dateStr]
      if (!dc?.start_time || !dc?.end_time) return null
      let bestStatus = null
      templates.filter(t => !t.is_adhoc).forEach(t => {
        const avKey = userId + '_' + t.id + '_' + dateStr
        const avStatus = availability[avKey]
        if (!avStatus) return
        if (timesOverlap(dc.start_time, dc.end_time, t.start_time, t.end_time)) {
          const order = { preferred:0, available:1, unavailable:2 }
          if (bestStatus === null || (order[avStatus]??3) < (order[bestStatus]??3)) {
            bestStatus = avStatus
          }
        }
      })
      if (bestStatus) return bestStatus
      const anyForDay = templates.filter(t => !t.is_adhoc).some(t => {
        const avKey = userId + '_' + t.id + '_' + dateStr
        return availability[avKey] && availability[avKey] !== 'unavailable'
      })
      return anyForDay ? 'available' : null
    }
    return null
  }

  const order = { preferred:0, available:1, null:2, unavailable:3 }
  eligible.sort((a,b) => {
    const ak      = getAvailabilityForUser(a.id) ?? null
    const bk      = getAvailabilityForUser(b.id) ?? null
    const statusDiff = (order[ak]??2) - (order[bk]??2)
    if (statusDiff !== 0) return statusDiff

    // Same status — earlier submission wins
    const aFirst = availabilityFirstSubmit[a.id + '_' + dateStr] ?? '9999'
    const bFirst = availabilityFirstSubmit[b.id + '_' + dateStr] ?? '9999'
    if (aFirst !== bFirst) return aFirst < bFirst ? -1 : 1

    // Same submission time — fewer hours this week wins (fairer distribution)
    return getWeeklyHours(a.id) - getWeeklyHours(b.id)
  })

  eligible.forEach(s => {
    const status = getAvailabilityForUser(s.id) ?? null
    const already = alreadyAssigned.includes(s.id)

    // CHANGE 1: fixed dc variable shadowing — use tplDc inside clash check
    const clashTpl = templates.find(t => {
      const k = `${t.id}_${dateStr}`
      const tplDc = dayConfigs[k]
      return (rotaShifts[k]??[]).some(rs => rs.user_id===s.id && rs.status!=='cancelled')
        && timesOverlap(effectiveStart, effectiveEnd, tplDc?.start_time??t.start_time, tplDc?.end_time??t.end_time)
    })
    const clashEvent = !clashTpl && Object.entries(rotaShifts).some(([k, shifts]) => {
      if (!k.endsWith(`_${dateStr}`)) return false
      if (!shifts.some(rs => rs.user_id===s.id)) return false
      const dc2 = dayConfigs[k]
      if (!dc2) return false
      return timesOverlap(effectiveStart, effectiveEnd, dc2.start_time??'', dc2.end_time??'')
    })

    const hasClash      = !already && (!!clashTpl || clashEvent)
    const isUnavailable = status === 'unavailable'
    const noResponse    = status === null

    if (noResponse && !already) return

    let overHourCap = false
    let hoursUsed = 0
    if (termTime && s.is_student && !already) {
      const dc  = dayConfigs[pickerCtx.configKey]
      const tpl = templates.find(t => t.id === templateId)
      const start = dc?.start_time ?? tpl?.start_time ?? '00:00'
      const end   = dc?.end_time   ?? tpl?.end_time   ?? '00:00'
      const [sh,sm] = (start||'00:00').slice(0,5).split(':').map(Number)
      let [eh,em]   = (end||'00:00').slice(0,5).split(':').map(Number)
      let shiftMins = (eh*60+em) - (sh*60+sm)
      if (shiftMins < 0) shiftMins += 1440
      hoursUsed = getWeeklyHours(s.id)
      overHourCap = (hoursUsed + shiftMins/60) > 20
    }

    const blocked = already || hasClash || isUnavailable || overHourCap

    const statusLabel = already         ? '<span class="avail-none">Added</span>'
                      : hasClash        ? '<span class="avail-unavailable">⚠ Clash</span>'
                      : isUnavailable   ? '<span class="avail-unavailable">✕ Unavailable</span>'
                      : status==='preferred' ? '<span class="avail-preferred">★ Preferred</span>'
                      : '<span class="avail-available">✓ Available</span>'

    const firstSubmit = availabilityFirstSubmit[s.id + '_' + dateStr]
    const submitHint  = firstSubmit && (status === 'preferred' || status === 'available')
      ? `<span style="font-size:0.65rem;color:var(--muted)">${new Date(firstSubmit).toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})} ${new Date(firstSubmit).toLocaleDateString('en-GB',{day:'numeric',month:'short'})}</span>`
      : ''

    const blockedReason = already ? 'Added' : hasClash ? 'Clash' : isUnavailable ? 'Unavailable' : overHourCap ? `${hoursUsed.toFixed(1)}h / 20h cap` : ''

    const weekHours = getWeeklyHours(s.id)
    const hoursColor = weekHours >= 35 ? 'var(--error)' : weekHours >= 20 ? 'var(--amber)' : 'var(--green)'
    const hoursLabel = `${weekHours % 1 === 0 ? weekHours : weekHours.toFixed(1)}h`

    const item = document.createElement('div')
    item.className = `picker-item${status==='preferred'&&!blocked?' preferred':''}${blocked?' blocked':''}`
    item.innerHTML = `
      <div>
        <div class="picker-name">${s.name}</div>
        <div class="picker-avail" style="display:flex;gap:0.5rem;align-items:center">${statusLabel}${submitHint}</div>
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.2rem">
        <span style="font-size:0.82rem;font-weight:500;color:${hoursColor}">${hoursLabel}</span>
        ${blocked ? `<span style="font-size:0.72rem;color:var(--muted)">${blockedReason}</span>` : ''}
      </div>`

    if (!blocked) {
      item.addEventListener('click', () => assignStaff(s))
    }
    list.appendChild(item)
  })
}

window.filterPicker = () => {
  if (!pickerCtx) return
  const already = (rotaShifts[pickerCtx.configKey]??[]).map(rs=>rs.user_id)
  buildPickerList(already, document.getElementById('picker-search').value)
}

window.closePicker = () => {
  document.getElementById('picker').style.display = 'none'
  document.getElementById('picker-overlay').classList.remove('open')
  pickerCtx = null
}

async function assignStaff(staffMember) {
  const { templateId, dateStr, defaultArea, configKey } = pickerCtx
  const venueArea = defaultArea === 'main_bar' || defaultArea === 'floor' ? 'main_bar' : defaultArea
  const isVenueKeyed = ['popup', 'kitchen', 'mandela', 'barista', 'wee_bar'].includes(templateId) || templateId.startsWith('mgmt_')

  const { data, error } = await supabase.from('rota_shifts').insert({
    fortnight_id:      selectedWeek.id,
    user_id:           staffMember.id,
    shift_template_id: isVenueKeyed ? null : templateId,
    shift_date:        dateStr,
    venue_area:        venueArea,
    status:            'scheduled',
    created_by:        currentUser.id,
  }).select().single()

  if (error) { console.error(error); showToast('Error assigning shift', true); return }

  if (!rotaShifts[configKey]) rotaShifts[configKey] = []
  rotaShifts[configKey].push({ id:data.id, user_id:staffMember.id, venue_area:venueArea, status:'scheduled' })

  const list = document.getElementById(`assigned-${configKey}`)
  if (list) list.appendChild(buildChip({ id:data.id, user_id:staffMember.id, venue_area:venueArea }, staffMember, templateId, dateStr))

  closePicker()
  updateDayCoverage(dateStr)
  // CHANGE 4: update fairness panel after assigning
  if (document.getElementById('fairness-panel').classList.contains('open')) renderFairnessPanel()
}

window.removeShift = async (shiftId, templateId, dateStr) => {
  const isPublished = selectedWeek?.status === 'published'
  let markUrgent = false

  if (isPublished) {
    const choice = await showRemoveChoice()
    if (choice === 'cancel') return
    markUrgent = choice === 'urgent'
  }

  const { error } = await supabase.from('rota_shifts').delete().eq('id', shiftId)
  if (error) { showToast('Error removing shift', true); return }

  const configKey = `${templateId}_${dateStr}`
  rotaShifts[configKey] = (rotaShifts[configKey]??[]).filter(rs=>rs.id!==shiftId)
  document.getElementById(`chip-${shiftId}`)?.remove()
  updateDayCoverage(dateStr)

  // CHANGE 5: update fairness panel after removing
  if (document.getElementById('fairness-panel').classList.contains('open')) renderFairnessPanel()

  if (markUrgent) {
    await postUrgentGap(templateId, dateStr, configKey)
  }
}

async function postUrgentGap(templateId, dateStr, configKey) {
  const tpl = templates.find(t => t.id === templateId)
  const dc  = dayConfigs[configKey]
  const startT = (dc?.start_time ?? tpl?.start_time ?? '').slice(0,5)
  const endT   = (dc?.end_time   ?? tpl?.end_time   ?? '').slice(0,5)
  const name   = tpl?.name ?? 'Shift'
  const dateDisp = new Date(dateStr).toLocaleDateString('en-GB', { weekday:'short', day:'numeric', month:'short' })
  const timeDisp = startT && endT ? ` ${startT}–${endT}` : ''
  const shiftMins = (() => {
    if (!startT || !endT) return 0
    const [sh,sm] = startT.split(':').map(Number)
    let [eh,em]   = endT.split(':').map(Number)
    let m = (eh*60+em) - (sh*60+sm)
    if (m < 0) m += 1440
    return m
  })()
  const shiftHrs = shiftMins / 60

  const { data: staffData } = await supabase.from('users')
    .select('id, is_student, contracted_hours')
    .eq('active', true)
    .neq('role', 'manager')
    .neq('role', 'admin')

  if (!staffData?.length) { showToast('No staff to notify', true); return }

  const staffHours = {}
  Object.entries(rotaShifts).forEach(([key, shifts]) => {
    const shiftDate = key.slice(-10)
    if (!shiftDate || shiftDate < selectedWeek.start_date || shiftDate > selectedWeek.end_date) return
    shifts.forEach(rs => {
      if (rs.status === 'cancelled') return
      const t2  = templates.find(t => t.id === key.slice(0, key.length - 11))
      const dc2 = dayConfigs[key]
      const s2  = (dc2?.start_time ?? t2?.start_time ?? '00:00').slice(0,5)
      const e2  = (dc2?.end_time   ?? t2?.end_time   ?? '00:00').slice(0,5)
      const [sh2,sm2] = s2.split(':').map(Number)
      let [eh2,em2]   = e2.split(':').map(Number)
      let m2 = (eh2*60+em2) - (sh2*60+sm2)
      if (m2 < 0) m2 += 1440
      staffHours[rs.user_id] = (staffHours[rs.user_id] ?? 0) + m2/60
    })
  })

  const eligible = staffData.filter(s => {
    const hoursUsed = staffHours[s.id] ?? 0
    if (termTime && s.is_student) return (hoursUsed + shiftHrs) <= 20
    return true
  })

  if (!eligible.length) { showToast('No staff with available hours to notify', true); return }

  const msg = `🚨 Urgent gap: ${name}${timeDisp} on ${dateDisp} needs cover. Can you help?`
  await supabase.from('notifications').insert(
    eligible.map(s => ({ user_id: s.id, type: 'urgent_gap', message: msg, read: false }))
  )

  showToast(`Urgent gap posted — ${eligible.length} staff notified!`)
}

function updateDayCoverage(dateStr) {
  let assigned=0, needed=0
  templates.forEach(t => {
    const key=`${t.id}_${dateStr}`, dc=dayConfigs[key]
    if (t.is_adhoc && !dc) return
    assigned += (rotaShifts[key]??[]).filter(s=>s.status!=='cancelled').length
    needed   += dc?.required_staff ?? t.min_staff
  })
  for (const vk of ['popup', 'kitchen', 'mandela', 'barista', 'wee_bar']) {
    const vKey = `${vk}_${dateStr}`
    if (dayConfigs[vKey]) {
      assigned += (rotaShifts[vKey]??[]).filter(s=>s.status!=='cancelled').length
      needed   += dayConfigs[vKey].required_staff ?? 1
    }
  }
  const color = assigned>=needed?'dot-green':assigned>0?'dot-amber':'dot-red'
  document.querySelectorAll('.day-panel').forEach(panel => {
    if (!panel.querySelector(`#body-${dateStr}`)) return
    const dot  = panel.querySelector('.coverage-dot')
    const text = panel.querySelector('.coverage-text')
    if (dot)  dot.className  = `coverage-dot ${color}`
    if (text) text.textContent = `${assigned}/${needed} filled`
  })
}

window.toggleDay = (id) => {
  const el = document.getElementById(id)
  el.style.display = el.style.display==='none' ? '' : 'none'
}

window.toggleNewWeekForm = () => {
  const form = document.getElementById('new-week-form')
  form.classList.toggle('visible')
  if (form.classList.contains('visible')) {
    const d=new Date(), day=d.getDay()
    const daysToMon = day === 0 ? 1 : day === 1 ? 7 : 8 - day
    d.setDate(d.getDate() + daysToMon)
    const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0')
    document.getElementById('new-start-date').value = `${y}-${m}-${dd}`
    updateEndDate()
  }
}

window.updateEndDate = () => {
  const start = document.getElementById('new-start-date').value
  if (!start) return
  const end = new Date(start); end.setDate(end.getDate()+6)
  document.getElementById('new-end-date').value = end.toISOString().split('T')[0]
}

window.createWeek = async () => {
  const startDate = document.getElementById('new-start-date').value
  const endDate   = document.getElementById('new-end-date').value
  if (!startDate||!endDate) { showToast('Please select a start date',true); return }
  const { data, error } = await supabase.from('fortnights').insert({ start_date:startDate, end_date:endDate, status:'draft' }).select().single()
  if (error) { showToast('Error creating week',true); return }
  showToast('Week created!')
  document.getElementById('new-week-form').classList.remove('visible')
  await loadWeeks()
  document.getElementById('week-select').value = data.id
  await window.loadWeek(data.id)
}

window.modalResolve = null

window.showConfirm = (title, msg, confirmLabel='Confirm', danger=true) => {
  return new Promise(resolve => {
    document.getElementById('modal-title').textContent = title
    document.getElementById('modal-msg').textContent   = msg
    const btn = document.getElementById('modal-confirm-btn')
    btn.textContent       = confirmLabel
    btn.style.background  = danger ? 'var(--error)' : 'var(--accent)'
    btn.style.color       = danger ? '#fff' : '#0d0d0d'
    document.getElementById('modal-overlay').style.display = 'flex'
    window.modalResolve = (result) => {
      document.getElementById('modal-overlay').style.display = 'none'
      resolve(result)
    }
  })
}

window.showRemoveChoice = () => {
  return new Promise(resolve => {
    document.getElementById('modal-title').textContent = 'Remove from shift?'
    document.getElementById('modal-msg').textContent   = 'Choose how to handle this removal.'
    const actionsEl = document.querySelector('#modal-overlay > div > div:last-child')
    actionsEl.innerHTML = `
      <button onclick="window.modalResolve('cancel')"
        style="background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:0.55rem 1.25rem;font-family:'DM Sans',sans-serif;font-size:0.88rem;cursor:pointer">
        Cancel
      </button>
      <button onclick="window.modalResolve('quiet')"
        style="background:transparent;border:1px solid var(--border);color:var(--text);border-radius:8px;padding:0.55rem 1.25rem;font-family:'DM Sans',sans-serif;font-size:0.88rem;cursor:pointer">
        Remove quietly
      </button>
      <button onclick="window.modalResolve('urgent')"
        style="background:var(--error);border:none;color:#fff;border-radius:8px;padding:0.55rem 1.25rem;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:500;cursor:pointer">
        Post as urgent gap
      </button>`
    document.getElementById('modal-overlay').style.display = 'flex'
    window.modalResolve = (result) => {
      document.getElementById('modal-overlay').style.display = 'none'
      actionsEl.innerHTML = `
        <button onclick="modalResolve(false)" style="background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;padding:0.55rem 1.25rem;font-family:'DM Sans',sans-serif;font-size:0.88rem;cursor:pointer">Cancel</button>
        <button id="modal-confirm-btn" onclick="modalResolve(true)" style="background:var(--error);border:none;color:#fff;border-radius:8px;padding:0.55rem 1.25rem;font-family:'DM Sans',sans-serif;font-size:0.88rem;font-weight:500;cursor:pointer">Confirm</button>`
      resolve(result)
    }
  })
}

window.publishRota = async () => {
  if (!selectedWeek) return
  const confirmed = await showConfirm(
    selectedWeek.status==='published' ? 'Republish rota?' : 'Publish rota?',
    selectedWeek.status==='published' ? 'Staff will be notified of any changes.' : 'All assigned staff will be notified.',
    selectedWeek.status==='published' ? 'Republish' : 'Publish',
    false
  )
  if (!confirmed) return

  const btn = document.getElementById('btn-publish')
  btn.disabled=true; btn.textContent='Publishing…'

  const { error } = await supabase.from('fortnights').update({ status:'published', published_at:new Date().toISOString() }).eq('id', selectedWeek.id)
  if (error) { showToast('Error publishing',true); btn.disabled=false; btn.textContent='Publish rota'; return }

  const assignedIds = [...new Set(Object.values(rotaShifts).flat().map(rs=>rs.user_id))]
  const fmt = d => new Date(d).toLocaleDateString('en-GB',{day:'numeric',month:'short'})
  const weekLabel = `${fmt(selectedWeek.start_date)} – ${fmt(selectedWeek.end_date)}`

  if (assignedIds.length > 0) {
    await supabase.from('notifications').insert(assignedIds.map(uid => ({
      user_id:uid, type:'rota_published',
      message:`The rota for w/c ${weekLabel} has been published. Check your shifts!`, read:false
    })))
  }

  selectedWeek.status='published'
  document.getElementById('week-status').className='week-status status-published'
  document.getElementById('week-status').textContent='Published'
  btn.textContent='Republish'; btn.disabled=false
  showToast(`Rota published! ${assignedIds.length} staff notified.`)
}

window.deleteWeek = async () => {
  if (!selectedWeek) return
  const delConfirmed = await showConfirm('Delete this week?', `This will remove all shifts for the week of ${selectedWeek.start_date}. This cannot be undone.`, 'Delete')
  if (!delConfirmed) return
  await supabase.from('rota_shifts').delete().eq('fortnight_id', selectedWeek.id)
  await supabase.from('availability').delete().eq('fortnight_id', selectedWeek.id)
  await supabase.from('shift_day_config').delete().eq('fortnight_id', selectedWeek.id)
  await supabase.from('fortnights').delete().eq('id', selectedWeek.id)
  showToast('Week deleted')
  await loadWeeks()
}

// CHANGE 4+5: fairness panel toggle and render
window.toggleFairnessPanel = () => {
  const panel = document.getElementById('fairness-panel')
  const btn   = document.getElementById('btn-fairness')
  const main  = document.querySelector('.main')
  const isOpen = panel.classList.toggle('open')
  btn.classList.toggle('active', isOpen)
  main.classList.toggle('panel-open', isOpen)
  if (isOpen) renderFairnessPanel()
}

function renderFairnessPanel() {
  const list = document.getElementById('fairness-list')
  if (!selectedWeek) {
    list.innerHTML = '<div class="fairness-empty">No week selected.</div>'
    return
  }

  // Collect unique users with their earliest submission across all dates this week
  const userEarliest = {}
  Object.entries(availabilityFirstSubmit).forEach(([key, submittedAt]) => {
    const userId = key.slice(0, key.lastIndexOf('_'))
    if (!userEarliest[userId] || submittedAt < userEarliest[userId]) {
      userEarliest[userId] = submittedAt
    }
  })

  if (Object.keys(userEarliest).length === 0) {
    list.innerHTML = '<div class="fairness-empty">No availability submitted yet.</div>'
    return
  }

  const sorted = Object.entries(userEarliest)
    .sort(([, a], [, b]) => a < b ? -1 : a > b ? 1 : 0)

  list.innerHTML = ''
  sorted.forEach(([userId, submittedAt], i) => {
    const staffMember = allStaff.find(s => s.id === userId)
    if (!staffMember) return

    const hours      = getWeeklyHours(userId)
    const hoursColor = hours >= 35 ? 'var(--error)' : hours >= 20 ? 'var(--amber)' : hours > 0 ? 'var(--green)' : 'var(--muted)'
    const hoursLabel = hours === 0 ? '0h' : hours % 1 === 0 ? `${hours}h` : `${hours.toFixed(1)}h`

    const timeStr = new Date(submittedAt).toLocaleString('en-GB', {
      day: 'numeric', month: 'short',
      hour: '2-digit', minute: '2-digit'
    })

    const row = document.createElement('div')
    row.className = 'fairness-row'
    row.innerHTML = `
      <div>
        <div style="display:flex;align-items:center;gap:0.4rem">
          <span class="fairness-rank">${i + 1}</span>
          <span class="fairness-name">${staffMember.name}</span>
        </div>
        <div class="fairness-time">${timeStr}</div>
      </div>
      <div class="fairness-hours" style="color:${hoursColor}">${hoursLabel}</div>`
    list.appendChild(row)
  })
}

function showToast(msg, isError=false) {
  const t=document.getElementById('toast')
  t.textContent=msg; t.className=`toast${isError?' error':''} show`
  setTimeout(()=>t.classList.remove('show'),3000)
}
